name: ai-service
on:
  pull_request:
    paths: ["projects/ai-service/**", ".github/workflows/ai-service.yml"]
  push:
    branches: [main]
    paths: ["projects/ai-service/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/ai-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: mypy app
      - run: pytest -q
