name: infra-plan
on:
  pull_request:
    paths: ["infrastructure/**", ".github/workflows/infra-plan.yml"]

# Authored in Phase 0, reviewed as PRs. Apply happens only in Phase 13.
jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - run: terraform fmt -check -recursive
      - run: terraform -chdir=envs/dev init -backend=false
      - run: terraform -chdir=envs/dev validate
