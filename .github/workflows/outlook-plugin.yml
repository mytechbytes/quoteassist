name: outlook-plugin
on:
  pull_request:
    paths: ["projects/outlook-plugin/**", ".github/workflows/outlook-plugin.yml"]
  push:
    branches: [main]
    paths: ["projects/outlook-plugin/**"]

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/outlook-plugin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      # Phase-0 stub has no committed lockfile yet; switch to `npm ci` in Phase 2.
      - run: npm install
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
