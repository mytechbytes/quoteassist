<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  .logo-lg { width:40px; height:40px; border-radius: 12px; background: linear-gradient(135deg, oklch(0.74 0.16 60), oklch(0.58 0.17 50)); display:grid; place-items:center; color:#fff; font: 800 20px/1 var(--mb-font-sans); box-shadow: 0 1px 2px rgb(0 0 0 / 0.08); }
  .logo-md { width:22px; height:22px; border-radius: 6px; background: linear-gradient(135deg, oklch(0.74 0.16 60), oklch(0.58 0.17 50)); }
  .logo-sm { width:14px; height:14px; border-radius: 4px; background: linear-gradient(135deg, oklch(0.74 0.16 60), oklch(0.58 0.17 50)); }
  .wordmark { display:inline-flex; align-items:center; gap: 10px; font: 800 18px/1 var(--mb-font-sans); letter-spacing: -0.02em; }
</style>
</head>
<body>
  <div class="row" style="gap:32px;">
    <div class="col" style="align-items:center; gap:6px;">
      <div class="logo-lg">M</div>
      <div class="sw-name">app icon · 40px</div>
    </div>
    <div class="col" style="align-items:center; gap:6px;">
      <div class="wordmark"><span class="logo-md"></span> MangoBook</div>
      <div class="sw-name">wordmark</div>
    </div>
    <div class="col" style="align-items:center; gap:6px;">
      <div class="wordmark" style="font-size:14px;"><span class="logo-sm"></span> MangoBook</div>
      <div class="sw-name">inline · footer</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row" style="font-family:var(--mb-font-mono); font-size:10.5px; color: oklch(from var(--mb-ink) l c h / 0.55); gap:8px;">
    <span>gradient: 135° amber → deep</span><span>·</span>
    <span>radius scales with size (12/6/4)</span><span>·</span>
    <span>single white M in 800</span>
  </div>
</body></html>
