<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body>
  <div class="sw-row" style="grid-template-columns: repeat(4, 1fr);">
    <div>
      <div class="sw" style="background: oklch(58% 0.17 50);"></div>
      <div class="sw-name">mango-deep</div>
      <div class="sw-val">oklch(58% 0.17 50)</div>
      <div class="sw-val" style="margin-top:2px;">primary · CTAs · focus</div>
    </div>
    <div>
      <div class="sw" style="background: oklch(74% 0.16 60);"></div>
      <div class="sw-name">mango-amber</div>
      <div class="sw-val">oklch(74% 0.16 60)</div>
      <div class="sw-val" style="margin-top:2px;">logo top, dark-mode primary</div>
    </div>
    <div>
      <div class="sw" style="background: oklch(82% 0.08 60);"></div>
      <div class="sw-name">mango-soft</div>
      <div class="sw-val">oklch(82% 0.08 60)</div>
      <div class="sw-val" style="margin-top:2px;">avatar gradient stop</div>
    </div>
    <div>
      <div class="sw" style="background: oklch(95% 0.04 60);"></div>
      <div class="sw-name">mango-tint</div>
      <div class="sw-val">oklch(95% 0.04 60)</div>
      <div class="sw-val" style="margin-top:2px;">fiction chip · hover wash</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row" style="gap:18px;">
    <div style="width:48px; height:48px; border-radius:12px; background: linear-gradient(135deg, oklch(0.74 0.16 60), oklch(0.58 0.17 50)); display:grid; place-items:center; color:#fff; font-weight:800; font-size:22px;">M</div>
    <div>
      <div style="font-weight:700;">The logo gradient</div>
      <div class="sw-val">linear-gradient(135deg, mango-amber → mango-deep)</div>
    </div>
  </div>
</body></html>
