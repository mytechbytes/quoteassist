<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body>
  <div class="sw-row" style="grid-template-columns: repeat(7, 1fr); gap:10px;">
    <div><div class="sw" style="aspect-ratio:1; background: oklch(0.95 0.04 60); border:1px solid oklch(0.42 0.12 60 / 0.2);"><div style="height:100%; display:grid; place-items:center; font-weight:700; font-size:11px; color: oklch(0.42 0.12 60);">Fiction</div></div><div class="sw-name">60</div></div>
    <div><div class="sw" style="aspect-ratio:1; background: oklch(0.95 0.04 290);"><div style="height:100%; display:grid; place-items:center; font-weight:700; font-size:11px; color: oklch(0.42 0.12 290);">Mystery</div></div><div class="sw-name">290</div></div>
    <div><div class="sw" style="aspect-ratio:1; background: oklch(0.95 0.04 350);"><div style="height:100%; display:grid; place-items:center; font-weight:700; font-size:11px; color: oklch(0.42 0.12 350);">Romance</div></div><div class="sw-name">350</div></div>
    <div><div class="sw" style="aspect-ratio:1; background: oklch(0.95 0.04 230);"><div style="height:100%; display:grid; place-items:center; font-weight:700; font-size:11px; color: oklch(0.42 0.12 230);">Sci-Fi</div></div><div class="sw-name">230</div></div>
    <div><div class="sw" style="aspect-ratio:1; background: oklch(0.95 0.04 150);"><div style="height:100%; display:grid; place-items:center; font-weight:700; font-size:11px; color: oklch(0.42 0.12 150);">Biography</div></div><div class="sw-name">150</div></div>
    <div><div class="sw" style="aspect-ratio:1; background: oklch(0.95 0.04 90);"><div style="height:100%; display:grid; place-items:center; font-weight:700; font-size:11px; color: oklch(0.42 0.12 90);">History</div></div><div class="sw-name">90</div></div>
    <div><div class="sw" style="aspect-ratio:1; background: oklch(0.95 0.04 30);"><div style="height:100%; display:grid; place-items:center; font-weight:700; font-size:11px; color: oklch(0.42 0.12 30);">Children</div></div><div class="sw-name">30</div></div>
  </div>
  <div class="divider"></div>
  <div class="row" style="font-family:var(--mb-font-mono); font-size:10.5px; color: oklch(from var(--mb-ink) l c h / 0.55);">
    Chip bg: <b style="font-family:var(--mb-font-mono);">oklch(.95 .04 H)</b>
    &nbsp;·&nbsp; Text: <b style="font-family:var(--mb-font-mono);">oklch(.42 .12 H)</b>
    &nbsp;·&nbsp; Cover gradient: <b style="font-family:var(--mb-font-mono);">L .55 → .38 at same H</b>
  </div>
</body></html>
