<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body>
  <div class="sw-row" style="grid-template-columns: repeat(4, 1fr);">
    <div><div class="sw" style="background: oklch(100% 0 0); border:1px solid var(--mb-paper-3);"></div><div class="sw-name">paper · base-100</div><div class="sw-val">oklch(100% 0 0)</div></div>
    <div><div class="sw" style="background: oklch(98.5% 0.005 70);"></div><div class="sw-name">paper-2 · base-200</div><div class="sw-val">oklch(98.5% 0.005 70)</div></div>
    <div><div class="sw" style="background: oklch(93% 0.008 70);"></div><div class="sw-name">paper-3 · base-300</div><div class="sw-val">oklch(93% 0.008 70)</div></div>
    <div><div class="sw" style="background: oklch(22% 0.018 60);"></div><div class="sw-name" style="color:var(--mb-ink);">ink · base-content</div><div class="sw-val">oklch(22% 0.018 60)</div></div>
  </div>
  <div class="divider"></div>
  <div class="row" style="font-size:11.5px; color: oklch(from var(--mb-ink) l c h / 0.65);">
    Surfaces are warm — note the tiny chroma in the neutrals. Borders use paper-3 throughout (cards, table rows, dropdowns).
  </div>
</body></html>
