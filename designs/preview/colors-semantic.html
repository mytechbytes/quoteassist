<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body>
  <div class="sw-row" style="grid-template-columns: repeat(5, 1fr);">
    <div><div class="sw" style="background: oklch(74% 0.16 230);"></div><div class="sw-name">sky</div><div class="sw-val">secondary · info</div></div>
    <div><div class="sw" style="background: oklch(74% 0.16 290);"></div><div class="sw-name">lilac</div><div class="sw-val">accent</div></div>
    <div><div class="sw" style="background: oklch(62% 0.14 150);"></div><div class="sw-name">success</div><div class="sw-val">live · positive Δ</div></div>
    <div><div class="sw" style="background: oklch(70% 0.15 85);"></div><div class="sw-name">warning</div><div class="sw-val">pre-order</div></div>
    <div><div class="sw" style="background: oklch(60% 0.17 25);"></div><div class="sw-name">error</div><div class="sw-val">delete · low stock</div></div>
  </div>
  <div class="divider"></div>
  <div class="row" style="gap:14px;">
    <span style="display:inline-flex; align-items:center; gap:6px; font-weight:700; font-size:12px; color: oklch(62% 0.14 150);"><span style="width:6px; height:6px; border-radius:99px; background: oklch(62% 0.14 150);"></span>Live</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-weight:700; font-size:12px; color: oklch(70% 0.15 85);"><span style="width:6px; height:6px; border-radius:99px; background: oklch(70% 0.15 85);"></span>Pre-order</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-weight:700; font-size:12px; opacity:0.6;"><span style="width:6px; height:6px; border-radius:99px; background: oklch(22% 0.018 60 / 0.4);"></span>Draft</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-weight:700; font-size:12px; opacity:0.6;"><span style="width:6px; height:6px; border-radius:99px; background: oklch(22% 0.018 60 / 0.3);"></span>Archived</span>
  </div>
</body></html>
