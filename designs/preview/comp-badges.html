<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  .chip { display:inline-flex; align-items:center; gap:4px; padding: 3px 9px; border-radius: 99px; font-weight: 700; font-size: 11px; line-height: 1.3; border:0; }
  .gen-fiction  { background: oklch(0.95 0.04 60);  color: oklch(0.42 0.12 60); }
  .gen-mystery  { background: oklch(0.95 0.04 290); color: oklch(0.42 0.12 290); }
  .gen-romance  { background: oklch(0.95 0.04 350); color: oklch(0.42 0.12 350); }
  .gen-scifi    { background: oklch(0.95 0.04 230); color: oklch(0.42 0.12 230); }
  .gen-bio      { background: oklch(0.95 0.04 150); color: oklch(0.42 0.12 150); }
  .gen-history  { background: oklch(0.95 0.04 90);  color: oklch(0.42 0.12 90); }
  .gen-children { background: oklch(0.95 0.04 30);  color: oklch(0.42 0.12 30); }
  .status { display:inline-flex; align-items:center; gap:6px; font-weight: 700; font-size: 12px; }
  .dot { width:6px; height:6px; border-radius:99px; }
  .badge-tag { display:inline-flex; align-items:center; gap:6px; padding: 2px 10px; border-radius: 99px; font-weight: 600; font-size: 11px; border: 1px solid oklch(58% 0.17 50 / 0.4); color: var(--mb-mango-deep); }
  .badge-counter { padding: 1px 8px; border-radius: 99px; background: var(--mb-mango-deep); color: #fff; font: 700 10px/1.4 var(--mb-font-sans); }
</style>
</head>
<body>
  <div class="row" style="gap:8px;">
    <span class="chip gen-fiction">Fiction</span>
    <span class="chip gen-mystery">Mystery</span>
    <span class="chip gen-romance">Romance</span>
    <span class="chip gen-scifi">Sci-Fi</span>
    <span class="chip gen-bio">Biography</span>
    <span class="chip gen-history">History</span>
    <span class="chip gen-children">Children</span>
  </div>
  <div class="row" style="gap:16px; margin-top:14px;">
    <span class="status" style="color: oklch(62% 0.14 150);"><span class="dot" style="background: oklch(62% 0.14 150);"></span>Live</span>
    <span class="status" style="color: oklch(70% 0.15 85);"><span class="dot" style="background: oklch(70% 0.15 85);"></span>Pre-order</span>
    <span class="status" style="opacity:0.6;"><span class="dot" style="background: oklch(22% 0.018 60 / 0.4);"></span>Draft</span>
    <span class="status" style="opacity:0.5;"><span class="dot" style="background: oklch(22% 0.018 60 / 0.3);"></span>Archived</span>
  </div>
  <div class="row" style="gap:8px; margin-top:14px;">
    <span class="badge-tag">family saga <span style="opacity:0.6;">×</span></span>
    <span class="badge-tag">Italy <span style="opacity:0.6;">×</span></span>
    <span class="badge-tag">grief <span style="opacity:0.6;">×</span></span>
    <span style="display:inline-flex; align-items:center; gap:6px; padding:2px 9px; border-radius:99px; background: oklch(62% 0.14 150 / 0.15); color: oklch(40% 0.14 150); font: 700 11px/1.3 var(--mb-font-sans); font-family:var(--mb-font-mono);">▲ 2.5%</span>
    <span class="badge-counter">24</span>
  </div>
</body></html>
