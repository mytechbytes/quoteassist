<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  .btn { display:inline-flex; align-items:center; gap:6px; font: 700 13px/1 var(--mb-font-sans); border-radius: 10px; padding: 0 14px; height: 36px; cursor:pointer; transition: background 0.2s; border: 1px solid transparent; }
  .btn-primary { background: var(--mb-mango-deep); color:#fff; }
  .btn-primary:hover { background: oklch(54% 0.17 50); }
  .btn-neutral { background: var(--mb-ink); color: #fff; }
  .btn-outline { background: var(--mb-paper); color: var(--mb-ink); border-color: var(--mb-paper-3); }
  .btn-outline:hover { background: var(--mb-paper-2); }
  .btn-ghost { background: transparent; color: var(--mb-ink); }
  .btn-ghost:hover { background: var(--mb-paper-2); }
  .btn-active { background: oklch(58% 0.17 50 / 0.1); color: var(--mb-mango-deep); }
  .btn-error  { background: var(--mb-error); color:#fff; }
</style>
</head>
<body>
  <div class="row" style="gap:10px;">
    <button class="btn btn-primary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      New title
    </button>
    <button class="btn btn-neutral">Save changes</button>
    <button class="btn btn-outline">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      Last 30 days
    </button>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-active">Mango</button>
    <button class="btn btn-error">Delete title</button>
  </div>
  <div class="divider"></div>
  <div class="row" style="font-family:var(--mb-font-mono); font-size:10.5px; color: oklch(from var(--mb-ink) l c h / 0.55);">
    h-36 (sm) and h-40 (toolbar) heights · 10px radius · 13/700 label · icon 13–14px before text
  </div>
</body></html>
