<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  .cv { position:relative; border-radius:3px; box-shadow: 0 1px 2px rgb(0 0 0 / 0.08); overflow:hidden; flex-shrink:0; }
  .cv .spine { position:absolute; left:0; top:0; bottom:0; width:3px; background: rgb(0 0 0 / 0.18); }
  .cv .ln    { position:absolute; left:8px; right:6px; height:1.5px; background: rgb(255 255 255 / 0.55); border-radius:1px; }
</style>
</head>
<body>
  <div class="row" style="gap:18px; align-items:flex-end;">
    <div>
      <div class="cv" style="width:36px; height:48px; background: linear-gradient(160deg, oklch(0.55 0.17 50), oklch(0.38 0.10 50));">
        <div class="spine"></div><div class="ln" style="top:11px;"></div><div class="ln" style="top:17px; right:12px;"></div>
      </div>
      <div class="sw-name">Fiction</div>
    </div>
    <div>
      <div class="cv" style="width:36px; height:48px; background: linear-gradient(160deg, oklch(0.42 0.14 290), oklch(0.28 0.10 290));">
        <div class="spine"></div><div class="ln" style="top:12px;"></div><div class="ln" style="top:18px; right:14px;"></div>
      </div>
      <div class="sw-name">Mystery</div>
    </div>
    <div>
      <div class="cv" style="width:36px; height:48px; background: linear-gradient(160deg, oklch(0.58 0.16 230), oklch(0.40 0.12 230));">
        <div class="spine"></div><div class="ln" style="top:9px;"></div><div class="ln" style="top:15px; right:8px;"></div><div class="ln" style="top:21px;"></div>
      </div>
      <div class="sw-name">Sci-Fi</div>
    </div>
    <div>
      <div class="cv" style="width:36px; height:48px; background: linear-gradient(160deg, oklch(0.55 0.17 350), oklch(0.38 0.12 350));">
        <div class="spine"></div><div class="ln" style="top:11px;"></div><div class="ln" style="top:17px; right:12px;"></div>
      </div>
      <div class="sw-name">Romance</div>
    </div>
    <div>
      <div class="cv" style="width:36px; height:48px; background: linear-gradient(160deg, oklch(0.48 0.14 150), oklch(0.32 0.10 150));">
        <div class="spine"></div><div class="ln" style="top:10px;"></div><div class="ln" style="top:16px; right:9px;"></div>
      </div>
      <div class="sw-name">Biography</div>
    </div>
    <div>
      <div class="cv" style="width:44px; height:60px; background: linear-gradient(160deg, oklch(0.55 0.17 50), oklch(0.38 0.10 50));">
        <div class="spine"></div><div class="ln" style="top:14px;"></div><div class="ln" style="top:22px; right:12px;"></div>
      </div>
      <div class="sw-name">Header</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row" style="font-family:var(--mb-font-mono); font-size:10.5px; color: oklch(from var(--mb-ink) l c h / 0.55); gap:8px;">
    <span>9×12 in tables</span><span>·</span>
    <span>11×15 sticky header</span><span>·</span>
    <span>36×48 modal</span><span>·</span>
    <span>spine 3px @ 18% black</span>
  </div>
</body></html>
