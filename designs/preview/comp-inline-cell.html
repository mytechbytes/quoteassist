<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  .tbl { width:100%; border-collapse: collapse; font-size: 13px; }
  .tbl th { text-align:left; padding: 6px 10px; font: 700 10px/1.2 var(--mb-font-sans); text-transform: uppercase; letter-spacing: 0.05em; color: oklch(from var(--mb-ink) l c h / 0.55); background: var(--mb-paper-2); border-bottom: 1px solid var(--mb-paper-3); }
  .tbl td { padding: 10px; border-bottom: 1px solid oklch(from var(--mb-paper-3) l c h / 0.7); vertical-align: middle; }
  .cell { padding: 8px 10px; min-height: 32px; cursor: cell; position: relative; }
  .focused { box-shadow: inset 0 0 0 2px var(--mb-mango-deep); background: oklch(58% 0.17 50 / 0.08); }
  .editing { box-shadow: inset 0 0 0 2px var(--mb-mango-deep), 0 4px 12px -4px rgba(0,0,0,0.12); background: var(--mb-paper); padding: 0; }
  .editing input { width:100%; height:32px; padding: 8px 10px; border:0; background:transparent; outline:0; font: inherit; }
  .dirty:before { content: ''; position: absolute; top: 0; right: 0; border-style: solid; border-width: 0 6px 6px 0; border-color: transparent var(--mb-mango-deep) transparent transparent; }
  .numeric { text-align: right; font-family: var(--mb-font-mono); }
</style>
</head>
<body>
  <table class="tbl">
    <thead><tr><th>Title</th><th style="text-align:right;">Price</th><th style="text-align:right;">Stock</th></tr></thead>
    <tbody>
      <tr>
        <td class="cell">The Salt Garden</td>
        <td class="cell numeric focused">$24.99</td>
        <td class="cell numeric">842</td>
      </tr>
      <tr>
        <td class="cell">A Quiet Reckoning</td>
        <td class="cell numeric editing"><input value="22.50"/></td>
        <td class="cell numeric dirty">412</td>
      </tr>
      <tr>
        <td class="cell">Orbital Drift</td>
        <td class="cell numeric">$18.99</td>
        <td class="cell numeric">1,204</td>
      </tr>
    </tbody>
  </table>
  <div class="divider"></div>
  <div class="row" style="font-family:var(--mb-font-mono); font-size:10.5px; color: oklch(from var(--mb-ink) l c h / 0.55); gap:8px;">
    <span>idle</span><span>·</span>
    <span>focused (inset 2px ring)</span><span>·</span>
    <span>editing (ring + lift)</span><span>·</span>
    <span>dirty (mango corner)</span>
  </div>
</body></html>
