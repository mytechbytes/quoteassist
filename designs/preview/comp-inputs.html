<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/>
<style>
  .input { display:flex; align-items:center; gap:8px; height:40px; padding: 0 12px; border: 1px solid var(--mb-paper-3); border-radius: 10px; background: var(--mb-paper); font-size: 13px; color: var(--mb-ink); }
  .input.focus { border-color: var(--mb-mango-deep); box-shadow: 0 0 0 2px oklch(58% 0.17 50 / 0.2); }
  .input input { border:0; outline:0; background: transparent; flex:1; font: inherit; color: inherit; }
  .input .ph { color: oklch(from var(--mb-ink) l c h / 0.5); }
  .kbd { font-family: var(--mb-font-mono); font-size: 10px; border: 1px solid var(--mb-paper-3); padding: 1px 5px; border-radius: 4px; color: oklch(from var(--mb-ink) l c h / 0.6); background: var(--mb-paper-2); }
  .lbl { font: 800 11px/1.2 var(--mb-font-sans); text-transform: uppercase; letter-spacing: 0.05em; color: oklch(from var(--mb-ink) l c h / 0.6); margin-bottom: 6px; }
</style>
</head>
<body>
  <div class="grid" style="grid-template-columns: 1fr 1fr; gap:16px;">
    <div>
      <div class="lbl">Search</div>
      <div class="input">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.6;"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
        <input placeholder="Search by title, author, ISBN…" />
        <span class="kbd">⌘K</span>
      </div>
    </div>
    <div>
      <div class="lbl">List price <span style="color:var(--mb-error);">*</span></div>
      <div class="input focus">
        <span style="font-family:var(--mb-font-mono); opacity:0.6;">$</span>
        <input value="24.99" />
      </div>
    </div>
    <div>
      <div class="lbl">ISBN-13</div>
      <div class="input">
        <input class="num-mono" value="978-1-4839-1102-7" style="font-size:12px;" />
      </div>
    </div>
    <div>
      <div class="lbl">Genre</div>
      <div class="input">
        <input value="Fiction" />
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.5;"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
    </div>
  </div>
</body></html>
