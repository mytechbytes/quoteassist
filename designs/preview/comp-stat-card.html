<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body>
  <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:14px;">
    <div style="background: var(--mb-paper); border: 1px solid var(--mb-paper-3); border-radius: 14px; padding: 16px;">
      <div style="display:flex; align-items:center; gap:6px; font: 700 11px/1.2 var(--mb-font-sans); opacity:0.7;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21c1-4.5 4-7 8-7s7 2.5 8 7"/></svg>
        Active readers
      </div>
      <div style="display:flex; align-items:flex-end; gap:8px; margin-top:6px;">
        <div style="font: 800 24px/1 var(--mb-font-sans); letter-spacing:-0.02em;">567,899</div>
        <span style="padding: 1px 6px; border-radius: 99px; background: oklch(62% 0.14 150 / 0.18); color: oklch(40% 0.14 150); font: 800 10px/1.4 var(--mb-font-sans); font-family:var(--mb-font-mono); margin-bottom:2px;">▲ 2.5%</span>
      </div>
      <svg viewBox="0 0 200 28" preserveAspectRatio="none" style="height: 28px; width:100%; margin-top:8px;">
        <polyline fill="none" stroke="oklch(74% 0.16 230)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          points="0,20 20,18 40,22 60,16 80,14 100,17 120,12 140,15 160,8 180,11 200,6"/>
      </svg>
    </div>
    <div style="background: var(--mb-paper); border: 1px solid var(--mb-paper-3); border-radius: 14px; padding: 16px;">
      <div style="display:flex; align-items:center; gap:6px; font: 700 11px/1.2 var(--mb-font-sans); opacity:0.7;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v10M9 9.5c0-1 1-2 3-2s3 1 3 2-1 1.5-3 2-3 1-3 2 1 2 3 2 3-1 3-2"/></svg>
        Total revenue
      </div>
      <div style="display:flex; align-items:flex-end; gap:8px; margin-top:6px;">
        <div style="font: 800 24px/1 var(--mb-font-sans); letter-spacing:-0.02em;">$3.465M</div>
        <span style="padding: 1px 6px; border-radius: 99px; background: oklch(62% 0.14 150 / 0.18); color: oklch(40% 0.14 150); font: 800 10px/1.4 var(--mb-font-sans); font-family:var(--mb-font-mono); margin-bottom:2px;">▲ 0.5%</span>
      </div>
      <svg viewBox="0 0 200 28" preserveAspectRatio="none" style="height: 28px; width:100%; margin-top:8px;">
        <polyline fill="none" stroke="oklch(58% 0.17 50)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          points="0,22 20,20 40,18 60,14 80,16 100,12 120,15 140,9 160,11 180,7 200,9"/>
      </svg>
    </div>
    <button style="border: 2px dashed var(--mb-paper-3); background: transparent; border-radius: 14px; display:grid; place-items:center; cursor:pointer;">
      <div style="text-align:center;">
        <div style="width:28px; height:28px; border-radius:8px; background: oklch(58% 0.17 50 / 0.1); color: var(--mb-mango-deep); display:grid; place-items:center; margin: 0 auto;">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
        </div>
        <div style="font: 800 11px/1.2 var(--mb-font-sans); margin-top:6px;">Add<br/>metric</div>
      </div>
    </button>
  </div>
</body></html>
