<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 18px 24px; }
  .ramp { display: grid; grid-template-columns: repeat(10, 1fr); gap: 4px; }
  .ramp .sw { aspect-ratio: 0.7; border-radius: 6px; border: 1px solid oklch(92.5% 0.005 214.3); position: relative; }
  .ramp .star { position: absolute; right: 4px; top: 4px; width: 8px; height: 8px; border-radius: 99px; background: oklch(21.8% 0.008 223.9); border: 2px solid white; box-sizing: border-box; }
  .ramp .nm { font: 600 9.5px/1.2 'JetBrains Mono', monospace; text-align: center; margin-top: 4px; color: oklch(45% 0.017 213.2); }
  .logo { width:40px; height:40px; border-radius: 12px; display:grid; place-items:center; color:#fff; font-family: 'Familjen Grotesk', sans-serif; font-weight: 700; font-size: 20px; background: linear-gradient(135deg, oklch(0.74 0.16 60), oklch(0.58 0.17 50)); }
</style>
</head>
<body>
  <div class="ramp">
    <div><div class="sw" style="background: oklch(97% 0.025 70);"></div><div class="nm">50</div></div>
    <div><div class="sw" style="background: oklch(94% 0.05 65);"></div><div class="nm">100</div></div>
    <div><div class="sw" style="background: oklch(88% 0.08 62);"></div><div class="nm">200</div></div>
    <div><div class="sw" style="background: oklch(82% 0.12 60);"></div><div class="nm">300</div></div>
    <div><div class="sw" style="background: oklch(74% 0.16 60);"></div><div class="nm">400</div></div>
    <div><div class="sw" style="background: oklch(66% 0.17 55);"></div><div class="nm">500</div></div>
    <div><div class="sw" style="background: oklch(58% 0.17 50);"><div class="star"></div></div><div class="nm">600 ★</div></div>
    <div><div class="sw" style="background: oklch(50% 0.16 48);"></div><div class="nm">700</div></div>
    <div><div class="sw" style="background: oklch(40% 0.13 45);"></div><div class="nm">800</div></div>
    <div><div class="sw" style="background: oklch(30% 0.10 42);"></div><div class="nm">900</div></div>
  </div>
  <div class="divider"></div>
  <div class="row" style="gap: 16px; align-items: center;">
    <div class="logo">M</div>
    <div>
      <div style="font-weight:700; font-family: 'Familjen Grotesk', sans-serif;">Logo gradient · 135°</div>
      <div style="font-family:'JetBrains Mono', monospace; font-size:10.5px; color: oklch(45% 0.017 213.2);">mango-400 → mango-600</div>
    </div>
    <div style="margin-left:auto; font-family:'JetBrains Mono', monospace; font-size:10.5px; color: oklch(45% 0.017 213.2);">★ brand · CTA · focus ring</div>
  </div>
</body></html>
