<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 18px 24px; }
  .ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 4px; }
  .ramp .sw { aspect-ratio: 0.7; border-radius: 6px; border: 1px solid oklch(92.5% 0.005 214.3); }
  .ramp .nm { font: 600 9.5px/1.2 'JetBrains Mono', monospace; text-align: center; margin-top: 4px; color: oklch(45% 0.017 213.2); }
</style>
</head>
<body>
  <div class="ramp">
    <div><div class="sw" style="background: oklch(98.7% 0.002 197.1);"></div><div class="nm">50</div></div>
    <div><div class="sw" style="background: oklch(96.3% 0.002 197.1);"></div><div class="nm">100</div></div>
    <div><div class="sw" style="background: oklch(92.5% 0.005 214.3);"></div><div class="nm">200</div></div>
    <div><div class="sw" style="background: oklch(87.2% 0.007 219.6);"></div><div class="nm">300</div></div>
    <div><div class="sw" style="background: oklch(72.3% 0.014 214.4);"></div><div class="nm">400</div></div>
    <div><div class="sw" style="background: oklch(56%   0.021 213.5);"></div><div class="nm">500</div></div>
    <div><div class="sw" style="background: oklch(45%   0.017 213.2);"></div><div class="nm">600</div></div>
    <div><div class="sw" style="background: oklch(37.8% 0.015 216);"></div><div class="nm">700</div></div>
    <div><div class="sw" style="background: oklch(27.5% 0.011 216.9);"></div><div class="nm">800</div></div>
    <div><div class="sw" style="background: oklch(21.8% 0.008 223.9);"></div><div class="nm">900</div></div>
    <div><div class="sw" style="background: oklch(14.8% 0.004 228.8);"></div><div class="nm">950</div></div>
  </div>
  <div class="divider"></div>
  <div style="font-family:'JetBrains Mono', monospace; font-size:10.5px; color: oklch(45% 0.017 213.2);">
    Cool slate-teal scale · light bg = 100, dark bg = 950 · borders 200/300 · text 600/900
  </div>
</body></html>
