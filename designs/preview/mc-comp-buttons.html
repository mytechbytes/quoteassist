<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 20px 24px; font-family: 'Inter', sans-serif; color: oklch(21.8% 0.008 223.9); }
  .btn { display: inline-flex; align-items: center; gap: 8px; height: 40px; padding: 0 16px; border-radius: 10px; font: 500 14px/1 Inter, sans-serif; border: 1px solid transparent; cursor: pointer; }
  .btn-primary { background: oklch(58% 0.17 50); color: white; }
  .btn-secondary { background: white; color: oklch(21.8% 0.008 223.9); border-color: oklch(87.2% 0.007 219.6); }
  .btn-ghost { background: transparent; color: oklch(45% 0.017 213.2); }
  .btn-dark { background: oklch(21.8% 0.008 223.9); color: white; }
  .btn-danger { background: oklch(60% 0.17 25); color: white; }
  .btn-sm { height: 32px; padding: 0 12px; font-size: 13px; gap: 6px; border-radius: 8px; }
  .btn-lg { height: 48px; padding: 0 22px; font-size: 15px; border-radius: 12px; }
</style>
</head>
<body>
  <div class="row" style="gap: 10px;">
    <button class="btn btn-primary">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
      New site
    </button>
    <button class="btn btn-secondary">Cancel</button>
    <button class="btn btn-dark">Sign in</button>
    <button class="btn btn-ghost">Skip</button>
    <button class="btn btn-danger">Delete</button>
  </div>
  <div class="row" style="gap: 10px; margin-top: 12px;">
    <button class="btn btn-sm btn-primary">Save</button>
    <button class="btn btn-sm btn-secondary">Filter</button>
    <button class="btn btn-lg btn-primary">Start free → no card</button>
  </div>
  <div class="divider"></div>
  <div style="font-family:'JetBrains Mono', monospace; font-size:10.5px; color: oklch(45% 0.017 213.2);">
    h-32/40/48 (sm/md/lg) · radius 8/10/12 · Inter 500/14 · mango-600 primary
  </div>
</body></html>
