<!doctype html>
<html><head><meta charset="utf-8"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="_card.css"/>
<style>
  body { padding: 0; font-family: 'Inter', sans-serif; color: oklch(21.8% 0.008 223.9); height: 100%; }
  .demo { display: grid; grid-template-columns: 220px 72px 1fr; min-height: 320px; }
  .side { background: white; border-right: 1px solid oklch(92.5% 0.005 214.3); padding: 12px 10px; }
  .side .row { display: flex; align-items: center; gap: 10px; padding: 6px 8px; border-radius: 6px; font-size: 12.5px; color: oklch(45% 0.017 213.2); }
  .side .row.active { background: oklch(97% 0.025 70); color: oklch(58% 0.17 50); font-weight: 600; }
  .side .row svg { color: currentColor; opacity: 1; }
  .side .sec { font: 700 9.5px/1 Inter; text-transform: uppercase; letter-spacing: 0.1em; color: oklch(56% 0.021 213.5); padding: 12px 8px 4px; }
  .head { display: flex; align-items: center; gap: 8px; padding-bottom: 10px; margin-bottom: 4px; border-bottom: 1px solid oklch(92.5% 0.005 214.3); }
  .logo { width: 24px; height: 24px; border-radius: 7px; background: linear-gradient(135deg, oklch(0.74 0.16 60), oklch(0.58 0.17 50)); display:grid; place-items:center; color:white; font: 700 12px/1 'Familjen Grotesk', sans-serif; }
  .arrow { margin-left: auto; padding: 3px; color: oklch(56% 0.021 213.5); }

  .mini-side { background: white; border-right: 1px solid oklch(92.5% 0.005 214.3); padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .mini-side .ico { width: 36px; height: 36px; border-radius: 7px; display: grid; place-items: center; color: oklch(45% 0.017 213.2); }
  .mini-side .ico.active { background: oklch(97% 0.025 70); color: oklch(58% 0.17 50); }
  .stage { padding: 20px 24px; }
</style>
</head>
<body>
  <div class="demo">
    <div class="side">
      <div class="head">
        <div class="logo">M</div>
        <div style="font-family:'Familjen Grotesk'; font-weight:700; font-size:14px;">MangoCMS</div>
        <div class="arrow"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></div>
      </div>
      <div class="sec">Workspace</div>
      <div class="row active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
        Overview
      </div>
      <div class="row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg>
        Sites
        <span style="margin-left: auto; padding: 0 6px; height:15px; line-height:15px; font: 700 9px/15px Inter; border-radius: 99px; background: oklch(58% 0.17 50); color: white;">12</span>
      </div>
      <div class="row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c.5-3.5 3-5 6-5s5.5 1.5 6 5"/><circle cx="17" cy="6" r="2"/><path d="M15 12c2.5 0 4 1 4.5 3"/></svg>
        Team
      </div>
      <div class="sec">Account</div>
      <div class="row">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/></svg>
        Settings
      </div>
    </div>

    <div class="mini-side">
      <div class="logo" style="margin-bottom: 4px;">M</div>
      <div class="ico active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg>
      </div>
      <div class="ico">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg>
      </div>
      <div class="ico">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20c.5-3.5 3-5 6-5s5.5 1.5 6 5"/></svg>
      </div>
      <div class="ico">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><circle cx="12" cy="12" r="9"/></svg>
      </div>
    </div>

    <div class="stage">
      <div style="font: 600 10px/1 Inter; text-transform: uppercase; letter-spacing: 0.12em; color: oklch(56% 0.021 213.5);">EXPANDED &nbsp;·&nbsp; COLLAPSED</div>
      <div style="font: 700 22px/1.1 'Familjen Grotesk', sans-serif; margin-top: 6px; letter-spacing: -0.02em;">Sidebar collapse</div>
      <p style="font-size: 13px; color: oklch(45% 0.017 213.2); margin-top: 8px; line-height: 1.5; max-width: 380px;">Click the chevron to switch between the full 260px nav and the 72px icon rail. Persisted via <code style="font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 1px 5px; background: oklch(98.7% 0.002 197.1); border-radius: 4px; border: 1px solid oklch(92.5% 0.005 214.3);">localStorage</code> — same pattern is back-patched into the MangoBook screens.</p>
    </div>
  </div>
</body></html>
