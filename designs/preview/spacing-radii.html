<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body>
  <div class="row" style="gap:18px; align-items:flex-end;">
    <div>
      <div style="width:96px; height:64px; background: var(--mb-paper-3); border-radius:3px;"></div>
      <div class="sw-name">3px · cover</div>
    </div>
    <div>
      <div style="width:96px; height:64px; background: var(--mb-paper-3); border-radius:10px;"></div>
      <div class="sw-name">10px · btn / input</div>
    </div>
    <div>
      <div style="width:96px; height:64px; background: var(--mb-paper-3); border-radius:14px;"></div>
      <div class="sw-name">14px · card / modal</div>
    </div>
    <div>
      <div style="width:96px; height:32px; background: var(--mb-paper-3); border-radius:99px;"></div>
      <div class="sw-name">99px · badge / pill</div>
    </div>
  </div>
  <div class="divider"></div>
  <div class="row" style="font-family:var(--mb-font-mono); font-size:10.5px; color: oklch(from var(--mb-ink) l c h / 0.55);">
    Sharp corners on book covers are intentional · everything UI is gently rounded · pills for status only
  </div>
</body></html>
