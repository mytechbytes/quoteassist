<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body>
  <div class="row" style="gap:8px; align-items:flex-end;">
    <div style="width:4px;  height:32px; background: var(--mb-mango-deep); border-radius:2px;"></div>
    <div style="width:8px;  height:32px; background: var(--mb-mango-deep); border-radius:2px;"></div>
    <div style="width:12px; height:32px; background: var(--mb-mango-deep); border-radius:2px;"></div>

    <span style="width:56px; text-align:center;">56</span>
  </div>
  <div class="divider"></div>
  <div class="row" style="font-family:var(--mb-font-mono); font-size:10.5px; color: oklch(from var(--mb-ink) l c h / 0.55); gap:10px;">
    <span>card-body 24</span><span>·</span>
