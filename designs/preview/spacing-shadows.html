<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body style="background: var(--mb-paper-2);">
  <div class="row" style="gap:24px; align-items:flex-end;">
    <div>
      <div style="width:120px; height:80px; background: var(--mb-paper); border-radius:14px; box-shadow: 0 1px 2px rgb(0 0 0 / 0.04);"></div>
      <div class="sw-name">shadow-sm</div>
      <div class="sw-val">covers · stat tiles</div>
    </div>
    <div>
      <div style="width:120px; height:80px; background: var(--mb-paper); border-radius:14px; box-shadow: 0 4px 12px -4px rgb(0 0 0 / 0.12);"></div>
      <div class="sw-name">shadow</div>
      <div class="sw-val">inline-edit lift</div>
    </div>
    <div>
      <div style="width:120px; height:80px; background: var(--mb-paper); border-radius:14px; box-shadow: 0 24px 50px -12px rgb(0 0 0 / 0.18);"></div>
      <div class="sw-name">shadow-xl</div>
      <div class="sw-val">dropdown · modal · toast</div>
    </div>
    <div>
      <div style="width:120px; height:80px; background: oklch(58% 0.17 50 / 0.08); border-radius:10px; box-shadow: inset 0 0 0 2px oklch(58% 0.17 50);"></div>
      <div class="sw-name">inset ring</div>
      <div class="sw-val">cell focus · primary inputs</div>
    </div>
  </div>
</body></html>
