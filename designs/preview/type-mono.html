<!doctype html>
<html><head><meta charset="utf-8"/><link rel="stylesheet" href="_card.css"/></head>
<body>
  <div class="row" style="gap:32px; align-items:flex-end;">
    <div>
      <div class="eyebrow">Total revenue</div>
      <div style="font:800 24px/1 var(--mb-font-sans); letter-spacing:-0.02em; font-feature-settings:'tnum'; margin-top:6px;">$3.465M</div>
    </div>
    <div>
      <div class="eyebrow">ISBN</div>
      <div class="num-mono" style="font-size:13px; margin-top:6px;">978-1-4839-1102-7</div>
    </div>
    <div>
      <div class="eyebrow">Units</div>
      <div class="num-mono" style="font-size:13px; font-weight:600; margin-top:6px;">4,128</div>
    </div>
    <div>
      <div class="eyebrow">Margin</div>
      <div class="num-mono" style="font-size:13px; font-weight:600; margin-top:6px;">38%</div>
    </div>
    <div>
      <div class="eyebrow">Delta</div>
      <div class="num-mono" style="font-size:13px; font-weight:700; margin-top:6px; color: var(--mb-success);">▲ 12.4%</div>
    </div>
  </div>
  <div class="divider"></div>
  <div style="font-family:var(--mb-font-mono); font-size:10.5px; color: oklch(from var(--mb-ink) l c h / 0.55);">
    JetBrains Mono · numbers, IDs, ISBNs, SKUs, prices, deltas — never body copy
  </div>
</body></html>
