<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>QuoteAssist — Agencies</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="qa-config.js"></script>
<link rel="stylesheet" href="qa.css"/>
<style>
  .qa-menu { position:absolute; z-index:140; min-width:188px; background:var(--mc-surface); border:1px solid var(--mc-border); border-radius:11px; box-shadow:0 24px 60px -12px rgb(0 0 0 / 0.28); padding:5px; }
  .qa-menu button { display:block; width:100%; text-align:left; padding:8px 10px; border:0; border-radius:7px; background:transparent; color:var(--mc-text); font:500 13px/1 'Inter',sans-serif; cursor:pointer; }
  .qa-menu button:hover { background:var(--mc-surface-2); }
  .qa-menu button.danger { color:var(--mc-error); }
  .qa-menu-sep { height:1px; background:var(--mc-border); margin:5px 4px; }
  .ag-card-top { display:flex; align-items:flex-start; gap:12px; }
</style>
</head>
<body class="font-sans" data-screen-label="Admin · Agencies">

<div class="mc-shell">
  <aside class="mc-side" data-nav data-app="admin" data-active="agencies"></aside>

  <div class="min-w-0">
    <header class="mc-topbar">
      <div class="flex items-center gap-2 text-sm">
        <span class="font-medium" style="color: var(--mc-text-3);">Platform</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--mc-text-3);"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="font-semibold">Agencies</span>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <button class="mc-btn mc-btn-sm mc-btn-primary" id="newBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          New agency
        </button>
      </div>
    </header>

    <main class="p-8">
      <div class="mb-6">
        <div class="text-xs font-bold tracking-widest uppercase" style="color: var(--mc-text-3);">Platform</div>
        <h1 class="font-display font-bold text-4xl tracking-[-0.025em] mt-1.5">Agencies</h1>
        <p class="mt-1.5 text-sm" style="color: var(--mc-text-2);">Every tenant on QuoteAssist. Create new agencies, change plans &amp; seat limits, suspend or remove.</p>
      </div>

      <div id="agencyList"></div>
    </main>
  </div>
</div>

<script src="qa-data.js"></script>
<script src="qa-listkit.js"></script>
<script src="qa-shell.js"></script>
<script src="qa-tweaks.js"></script>
<script>
(function(){
  var $ = function(s,r){return (r||document).querySelector(s);};
  var dots='<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="5" r="1.4"/><circle cx="12" cy="12" r="1.4"/><circle cx="12" cy="19" r="1.4"/></svg>';
  var ctrl;

  function statusBadge(st){
    if(st==='active') return '<span class="mc-status mc-status-live">Active</span>';
    if(st==='trial') return '<span class="mc-status mc-status-build">Trial</span>';
    return '<span class="mc-status mc-status-error">Suspended</span>';
  }
  function menuBtn(t){ return '<button class="mc-btn mc-btn-sm mc-btn-ghost mc-btn-icon ag-menu" data-id="'+t.id+'">'+dots+'</button>'; }

  function viewTable(items){
    var rows = items.map(function(t){
      var V=QAData.vertical(t.vertical), P=QAData.PLANS[t.plan];
      return '<tr><td><div class="font-semibold text-sm">'+t.name+'</div><div class="text-[11px]" style="color:var(--mc-text-3);">'+t.owner+' · '+t.region+' · since '+t.created+'</div></td>'+
        '<td><span class="qa-vchip">'+QAData.svgIcon(V.icon,13)+V.name+'</span></td>'+
        '<td><span class="mc-badge mc-badge-neutral">'+t.plan+'</span></td>'+
        '<td class="font-mono text-xs">'+t.seatsUsed+' / '+P.seats+'</td>'+
        '<td class="font-mono text-xs">'+(t.mrr?'$'+t.mrr:'—')+'</td>'+
        '<td>'+statusBadge(t.status)+'</td>'+
        '<td class="text-right">'+menuBtn(t)+'</td></tr>';
    }).join('');
    return '<div class="mc-card overflow-hidden"><table class="mc-table"><thead><tr><th>Agency</th><th>Vertical</th><th>Plan</th><th>Seats</th><th>MRR</th><th>Status</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  function viewCards(items){
    return '<div class="qa-cardgrid">'+items.map(function(t){
      var V=QAData.vertical(t.vertical), P=QAData.PLANS[t.plan];
      return '<div class="qa-dcard"><div class="ag-card-top"><div class="qa-vbadge">'+QAData.svgIcon(V.icon,18)+'</div>'+
        '<div class="flex-1 min-w-0"><div class="font-semibold text-sm truncate">'+t.name+'</div><div class="text-[11px] truncate" style="color:var(--mc-text-3);">'+V.name+'</div></div>'+menuBtn(t)+'</div>'+
        '<div class="flex items-center justify-between mt-4 pt-3" style="border-top:1px solid var(--mc-border);">'+statusBadge(t.status)+'<span class="mc-badge mc-badge-neutral">'+t.plan+'</span></div>'+
        '<div class="flex items-center justify-between mt-2 text-xs" style="color:var(--mc-text-3);"><span>'+t.seatsUsed+' / '+P.seats+' seats</span><span class="font-mono">'+(t.mrr?'$'+t.mrr+'/mo':'trial')+'</span></div></div>';
    }).join('')+'</div>';
  }

  function bind(body){
    body.querySelectorAll('.ag-menu').forEach(function(b){ b.addEventListener('click', function(e){ e.stopPropagation(); openMenu(b, b.dataset.id); }); });
  }
  function openMenu(anchor,id){
    closeMenu();
    var t=QAData.tenant(id);
    var m=document.createElement('div'); m.className='qa-menu'; m.id='agMenu';
    m.innerHTML='<button data-a="edit">Edit agency</button>'+
      (t.status==='suspended'?'<button data-a="resume">Reactivate</button>':'<button data-a="suspend">Suspend</button>')+
      '<div class="qa-menu-sep"></div><button data-a="remove" class="danger">Remove agency</button>';
    document.body.appendChild(m);
    var r=anchor.getBoundingClientRect(); m.style.top=(r.bottom+4)+'px'; m.style.left=Math.max(12,r.right-m.offsetWidth)+'px';
    m.querySelector('[data-a="edit"]').onclick=function(){closeMenu(); openModal(t);};
    var sus=m.querySelector('[data-a="suspend"]'); if(sus) sus.onclick=function(){closeMenu(); QAData.updateTenant(id,{status:'suspended',mrr:0}); ctrl.refresh(); QAData.toast(t.name+' suspended.','warn');};
    var res=m.querySelector('[data-a="resume"]'); if(res) res.onclick=function(){closeMenu(); QAData.updateTenant(id,{status:'active',mrr:QAData.PLANS[t.plan].price}); ctrl.refresh(); QAData.toast(t.name+' reactivated.');};
    m.querySelector('[data-a="remove"]').onclick=function(){closeMenu(); confirmRemove(t);};
    setTimeout(function(){document.addEventListener('mousedown',outside);},0);
  }
  function closeMenu(){ var m=$('#agMenu'); if(m) m.remove(); document.removeEventListener('mousedown',outside); }
  function outside(e){ var m=$('#agMenu'); if(m && !m.contains(e.target) && !e.target.closest('.ag-menu')) closeMenu(); }

  function modal(html,max){
    var bd=document.createElement('div'); bd.className='mc-modal-backdrop'; bd.style.display='grid';
    bd.innerHTML='<div class="mc-modal" style="max-width:'+(max||480)+'px;">'+html+'</div>';
    document.body.appendChild(bd);
    bd.addEventListener('click',function(e){ if(e.target===bd) bd.remove(); });
    bd.querySelectorAll('[data-close]').forEach(function(b){ b.addEventListener('click',function(){bd.remove();}); });
    return bd;
  }
  function head(title,sub){
    return '<div class="mc-modal-head"><div><div class="font-display font-bold text-lg">'+title+'</div>'+(sub?'<div class="text-xs mt-0.5" style="color:var(--mc-text-3);">'+sub+'</div>':'')+'</div><button class="mc-btn mc-btn-sm mc-btn-icon mc-btn-ghost" data-close><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>';
  }
  function vertOptions(sel){ return QAData.VERTICAL_ORDER.map(function(v){ return '<option value="'+v+'"'+(v===sel?' selected':'')+'>'+QAData.vertical(v).name+'</option>'; }).join(''); }
  function planOptions(sel){ return Object.keys(QAData.PLANS).map(function(p){ return '<option value="'+p+'"'+(p===sel?' selected':'')+'>'+p+' · '+QAData.PLANS[p].seats+' seats</option>'; }).join(''); }
  function statusOptions(sel){ return ['active','trial','suspended'].map(function(s){ return '<option value="'+s+'"'+(s===sel?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>'; }).join(''); }

  function openModal(t){
    var isNew=!t;
    var bd=modal(head(isNew?'New agency':'Edit '+t.name, isNew?'Onboard a new tenant onto QuoteAssist.':'Update plan, vertical and status.')+
      '<div class="mc-modal-body">'+
        '<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="mc-label">Agency name</label><input class="mc-input" id="a-name" value="'+(t?t.name:'')+'" placeholder="Acme Sales"/></div>'+
        '<div><label class="mc-label">Owner</label><input class="mc-input" id="a-owner" value="'+(t?t.owner:'')+'" placeholder="Full name"/></div></div>'+
        '<div class="grid grid-cols-2 gap-4 mb-4"><div><label class="mc-label">Vertical</label><select class="mc-input mc-select" id="a-vert">'+vertOptions(t?t.vertical:'product')+'</select></div>'+
        '<div><label class="mc-label">Region</label><input class="mc-input" id="a-region" value="'+(t?t.region:'')+'" placeholder="UK"/></div></div>'+
        '<div class="grid grid-cols-2 gap-4"><div><label class="mc-label">Plan</label><select class="mc-input mc-select" id="a-plan">'+planOptions(t?t.plan:'Growth')+'</select></div>'+
        '<div><label class="mc-label">Status</label><select class="mc-input mc-select" id="a-status">'+statusOptions(t?t.status:'trial')+'</select></div></div>'+
        '<div class="text-xs mt-3" style="color:var(--mc-text-3);">Seat limit follows the plan. Discount quotas seed automatically from the vertical\u2019s categories.</div>'+
      '</div>'+
      '<div class="mc-modal-foot"><button class="mc-btn mc-btn-sm mc-btn-ghost" data-close>Cancel</button><button class="mc-btn mc-btn-sm mc-btn-primary" id="a-save">'+(isNew?'Create agency':'Save changes')+'</button></div>');
    $('#a-save',bd).onclick=function(){
      var name=$('#a-name',bd).value.trim(); if(!name){ $('#a-name',bd).focus(); return; }
      var plan=$('#a-plan',bd).value, status=$('#a-status',bd).value;
      var data={ name:name, owner:$('#a-owner',bd).value.trim()||'—', vertical:$('#a-vert',bd).value, region:$('#a-region',bd).value.trim()||'—', plan:plan, status:status, mrr: status==='active'?QAData.PLANS[plan].price:0 };
      if(isNew){ data.seatsUsed=0; data.created='Jun 2026'; QAData.addTenant(data); QAData.toast(name+' created.'); }
      else { QAData.updateTenant(t.id,data); QAData.toast(name+' updated.'); }
      bd.remove(); ctrl.refresh();
    };
  }
  function confirmRemove(t){
    var bd=modal(head('Remove '+t.name+'?')+
      '<div class="mc-modal-body"><p class="text-sm" style="color:var(--mc-text-2);">This deletes the tenant and its users from QuoteAssist. Their quotas and history are removed. This can\u2019t be undone.</p></div>'+
      '<div class="mc-modal-foot"><button class="mc-btn mc-btn-sm mc-btn-ghost" data-close>Cancel</button><button class="mc-btn mc-btn-sm mc-btn-danger" id="rm">Remove agency</button></div>');
    $('#rm',bd).onclick=function(){ QAData.removeTenant(t.id); bd.remove(); ctrl.refresh(); QAData.toast(t.name+' removed.','warn'); };
  }

  document.getElementById('newBtn').addEventListener('click', function(){ openModal(null); });

  ctrl = window.QAList({
    mount:'agencyList', key:'agencies', noun:'agency', searchPlaceholder:'Search agency or owner…',
    views:['table','cards'], defaultView:'table', pageSize:6, emptyTitle:'No agencies match.',
    filterFields:{
      vertical:{ label:'Vertical', type:'enum', ops:['is','is not'], options:QAData.VERTICAL_ORDER.map(function(v){return QAData.vertical(v).name;}), get:function(t){return QAData.vertical(t.vertical).name;} },
      plan:{ label:'Plan', type:'enum', ops:['is','is not'], options:Object.keys(QAData.PLANS), get:function(t){return t.plan;} },
      status:{ label:'Status', type:'enum', ops:['is','is not'], options:['active','trial','suspended'], get:function(t){return t.status;} },
      seatsUsed:{ label:'Seats', type:'number', ops:['greater than','less than'], get:function(t){return t.seatsUsed;} }
    },
    filterOrder:['vertical','plan','status','seatsUsed'],
    sortFields:{
      name:{ label:'Name', key:function(t){return t.name;}, dir:['A → Z','Z → A'] },
      seats:{ label:'Seats', key:function(t){return t.seatsUsed;}, dir:['Most','Fewest'], numeric:true },
      mrr:{ label:'MRR', key:function(t){return t.mrr;}, dir:['High → Low','Low → High'], numeric:true }
    },
    sortOrder:['name','seats','mrr'],
    searchText:function(t){return t.name+' '+t.owner+' '+QAData.vertical(t.vertical).name;},
    getData:function(){return QAData.tenants.slice();},
    renderView:function(v,items){ return v==='cards'?viewCards(items):viewTable(items); },
    onRendered:function(v,items,body){ bind(body); }
  });
})();
</script>
</body>
</html>
