<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>QuoteAssist — Verticals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="qa-config.js"></script>
<link rel="stylesheet" href="qa.css"/>
<style>
  .vc-cat { display:inline-flex; align-items:center; height:26px; padding:0 11px; border-radius:8px; background:var(--mc-surface-2); border:1px solid var(--mc-border); font:600 12px/1 'Inter',sans-serif; color:var(--mc-text-2); }
  .vc-term { display:flex; align-items:baseline; gap:6px; white-space:nowrap; }
  .vc-term .k { font:600 11px/1 'Inter',sans-serif; text-transform:uppercase; letter-spacing:.06em; color:var(--mc-text-3); white-space:nowrap; }
  .vc-term .v { font:600 13px/1 'Inter',sans-serif; }
</style>
</head>
<body class="font-sans" data-screen-label="Admin · Verticals">

<div class="mc-shell">
  <aside class="mc-side" data-nav data-app="admin" data-active="verticals"></aside>

  <div class="min-w-0">
    <header class="mc-topbar">
      <div class="flex items-center gap-2 text-sm">
        <span class="font-medium" style="color: var(--mc-text-3);">Platform</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--mc-text-3);"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="font-semibold">Verticals</span>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <button class="mc-btn mc-btn-sm mc-btn-primary" id="newVert">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          New vertical
        </button>
      </div>
    </header>

    <main class="p-8">
      <div class="mb-6">
        <div class="text-xs font-bold tracking-widest uppercase" style="color: var(--mc-text-3);">Platform</div>
        <h1 class="font-display font-bold text-4xl tracking-[-0.025em] mt-1.5">Verticals</h1>
        <p class="mt-1.5 text-sm" style="color: var(--mc-text-2);">Each agency runs on one vertical. A vertical defines the deal terminology, money unit and the pricing categories that discount quotas are set against.</p>
      </div>

      <div id="vertGrid" class="space-y-4"></div>
    </main>
  </div>
</div>

<script src="qa-data.js"></script>
<script src="qa-shell.js"></script>
<script src="qa-tweaks.js"></script>
<script>
(function(){
  function render(){
    var counts={}; QAData.tenants.forEach(function(t){counts[t.vertical]=(counts[t.vertical]||0)+1;});
    document.getElementById('vertGrid').innerHTML = QAData.VERTICAL_ORDER.map(function(v){
      var V=QAData.vertical(v), n=counts[v]||0;
      return '<div class="mc-card p-6"><div class="flex items-start gap-4">'+
        '<div class="qa-vbadge" style="width:46px;height:46px;border-radius:13px;">'+QAData.svgIcon(V.icon,22)+'</div>'+
        '<div class="flex-1 min-w-0">'+
          '<div class="flex items-center gap-3 flex-wrap"><span class="font-display font-bold text-lg">'+V.name+'</span>'+
            (n? '<span class="mc-badge mc-badge-brand">'+n+' '+(n===1?'agency':'agencies')+'</span>' : '<span class="mc-badge mc-badge-neutral">No agencies yet</span>')+'</div>'+
          '<div class="flex items-center gap-6 mt-3 mb-4">'+
            '<div class="vc-term"><span class="k">Deal noun</span><span class="v">'+V.deal+'</span></div>'+
            '<div class="vc-term"><span class="k">Plural</span><span class="v">'+V.dealPlural+'</span></div>'+
            '<div class="vc-term"><span class="k">Money unit</span><span class="v">'+V.unit+'</span></div>'+
          '</div>'+
          '<div class="text-[11px] font-bold uppercase tracking-wider mb-2" style="color:var(--mc-text-3);">Pricing categories · quotas set per category</div>'+
          '<div class="flex flex-wrap gap-2">'+V.categories.map(function(c){return '<span class="vc-cat">'+c+'</span>';}).join('')+'</div>'+
        '</div>'+
        '<button class="mc-btn mc-btn-sm mc-btn-secondary" data-edit="'+v+'">Edit</button>'+
      '</div></div>';
    }).join('');
    document.querySelectorAll('[data-edit]').forEach(function(b){ b.addEventListener('click', function(){ openModal(QAData.vertical(b.dataset.edit)); }); });
  }

  function modal(html,max){
    var bd=document.createElement('div'); bd.className='mc-modal-backdrop'; bd.style.display='grid';
    bd.innerHTML='<div class="mc-modal" style="max-width:'+(max||520)+'px;">'+html+'</div>';
    document.body.appendChild(bd);
    bd.addEventListener('click',function(e){ if(e.target===bd) bd.remove(); });
    bd.querySelectorAll('[data-close]').forEach(function(b){ b.addEventListener('click',function(){bd.remove();}); });
    return bd;
  }
  function head(title,sub){
    return '<div class="mc-modal-head"><div><div class="font-display font-bold text-lg">'+title+'</div>'+(sub?'<div class="text-xs mt-0.5" style="color:var(--mc-text-3);">'+sub+'</div>':'')+'</div><button class="mc-btn mc-btn-sm mc-btn-icon mc-btn-ghost" data-close><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>';
  }
  function openModal(V){
    var isNew=!V;
    var bd=modal(head(isNew?'New vertical':'Edit '+V.name, 'Terminology and categories shown to agencies on this vertical.')+
      '<div class="mc-modal-body">'+
        '<label class="mc-label">Vertical name</label><input class="mc-input mb-4" id="v-name" value="'+(V?V.name:'')+'" placeholder="e.g. Real Estate"/>'+
        '<div class="grid grid-cols-3 gap-3 mb-4">'+
          '<div><label class="mc-label">Deal noun</label><input class="mc-input" id="v-deal" value="'+(V?V.deal:'')+'" placeholder="deal"/></div>'+
          '<div><label class="mc-label">Plural</label><input class="mc-input" id="v-plural" value="'+(V?V.dealPlural:'')+'" placeholder="deals"/></div>'+
          '<div><label class="mc-label">Money unit</label><input class="mc-input" id="v-unit" value="'+(V?V.unit:'£')+'"/></div>'+
        '</div>'+
        '<label class="mc-label">Pricing categories <span style="font-weight:500;color:var(--mc-text-3);">· comma separated</span></label>'+
        '<input class="mc-input" id="v-cats" value="'+(V?V.categories.join(', '):'')+'" placeholder="Tier A, Tier B, Tier C"/>'+
        '<div class="text-xs mt-3" style="color:var(--mc-text-3);">Changing categories is demo-only here — quotas would re-seed for affected agencies in production.</div>'+
      '</div>'+
      '<div class="mc-modal-foot"><button class="mc-btn mc-btn-sm mc-btn-ghost" data-close>Cancel</button><button class="mc-btn mc-btn-sm mc-btn-primary" id="v-save">'+(isNew?'Create vertical':'Save changes')+'</button></div>');
    document.getElementById('v-save').onclick=function(){ bd.remove(); QAData.toast('Vertical saved. (Demo — not persisted across reload.)'); };
  }
  document.getElementById('newVert').addEventListener('click', function(){ openModal(null); });
  render();
})();
</script>
</body>
</html>
