<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>QuoteAssist — Approvals</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="qa-config.js"></script>
<link rel="stylesheet" href="qa.css"/>
<style>
  #aTabs { display:flex; gap:2px; border-bottom:1px solid var(--mc-border); margin-bottom:22px; }
  .a-tab { position:relative; padding:11px 4px; margin-right:22px; border:0; background:transparent; cursor:pointer; font:600 14px/1 'Inter',sans-serif; color:var(--mc-text-3); display:flex; align-items:center; gap:8px; }
  .a-tab:hover { color:var(--mc-text); }
  .a-tab.on { color:var(--mc-text); }
  .a-tab.on::after { content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--mc-brand); border-radius:2px; }
  .a-tab .cnt { min-width:18px; height:18px; padding:0 5px; display:grid; place-items:center; border-radius:99px; background:var(--mc-surface-2); color:var(--mc-text-2); font:700 10px/1 'Inter',sans-serif; }
  .a-tab.on .cnt { background:var(--mc-brand); color:#fff; }
  .areq-grid { display:grid; grid-template-columns:1fr; gap:12px; }
  .meter-mini { position:relative; height:10px; border-radius:99px; background:var(--mc-surface-2); overflow:hidden; }
  .meter-mini .self { position:absolute; left:0; top:0; bottom:0; background:color-mix(in oklch,var(--mc-success) 45%,transparent); }
  .meter-mini .appr { position:absolute; top:0; bottom:0; background:color-mix(in oklch,var(--mc-warning) 50%,transparent); }
  .meter-mini .mk { position:absolute; top:-3px; width:2px; height:16px; background:var(--mc-text); }
</style>
</head>
<body class="font-sans" data-screen-label="Agency · Approvals">

<div class="mc-shell">
  <aside class="mc-side" data-nav data-app="agency" data-active="approvals"></aside>

  <div class="min-w-0">
    <header class="mc-topbar">
      <div class="flex items-center gap-2 text-sm">
        <span class="font-medium" style="color: var(--mc-text-3);">Northwind Supply</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--mc-text-3);"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="font-semibold">Approvals</span>
      </div>
    </header>

    <main class="p-8">
      <div class="mb-6">
        <div class="text-xs font-bold tracking-widest uppercase" style="color: var(--mc-text-3);">Northwind Supply</div>
        <h1 class="font-display font-bold text-4xl tracking-[-0.025em] mt-1.5">Discount approvals</h1>
        <p class="mt-1.5 text-sm" style="color: var(--mc-text-2);">Requests routed to you when a salesperson asks for a discount above their self-approve limit.</p>
      </div>

      <div id="aTabs">
        <button class="a-tab on" data-tab="pending">Pending <span class="cnt" id="cnt-pending">0</span></button>
        <button class="a-tab" data-tab="decided">Decided <span class="cnt" id="cnt-decided">0</span></button>
      </div>

      <div id="reqBody" class="areq-grid"></div>
    </main>
  </div>
</div>

<script src="qa-data.js"></script>
<script src="qa-shell.js"></script>
<script src="qa-tweaks.js"></script>
<script>
(function(){
  var $=function(s,r){return (r||document).querySelector(s);};
  var T=QAData.ACTIVE_TENANT, V=QAData.vertical(QAData.activeTenant().vertical);
  var TAB='pending';

  function avatar(s,sz){ sz=sz||36; return '<div class="rounded-full grid place-items-center text-white font-bold flex-shrink-0 text-sm" style="width:'+sz+'px;height:'+sz+'px;background:linear-gradient(135deg,oklch(0.74 0.16 '+s.hue+'),oklch(0.5 0.14 '+s.hue+'));">'+s.name.split(' ').map(function(w){return w[0];}).slice(0,2).join('')+'</div>'; }

  function meter(r){
    var q=QAData.quotaFor(T,r.level,r.category);
    var max=Math.max(q.cap, r.requested, 1);
    var selfPct=q.self/max*100, capPct=q.cap/max*100, reqPct=r.requested/max*100;
    return '<div class="meter-mini"><div class="self" style="width:'+selfPct+'%;"></div>'+
      '<div class="appr" style="left:'+selfPct+'%;width:'+(capPct-selfPct)+'%;"></div>'+
      '<div class="mk" style="left:calc('+reqPct+'% - 1px);"></div></div>'+
      '<div class="flex justify-between mt-1.5 font-mono text-[10px]" style="color:var(--mc-text-3);"><span>self '+q.self+'%</span><span>requested '+r.requested+'%</span><span>cap '+q.cap+'%</span></div>';
  }

  function pendingCard(r){
    var s=QAData.seller(r.seller);
    return '<div class="qa-areq" data-id="'+r.id+'">'+
      '<div class="flex items-start gap-3">'+avatar(s)+
        '<div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap">'+
          '<span class="font-semibold text-sm">'+s.name+'</span><span class="mc-badge mc-badge-neutral">'+r.level+'</span>'+
          '<span class="text-xs" style="color:var(--mc-text-3);">routed to <b style="color:var(--mc-text-2);">'+r.routedTo+'</b></span>'+
          '<span class="text-xs" style="color:var(--mc-text-3);margin-left:auto;">'+QAData.fmtAgo(r.ts)+'</span></div>'+
          '<div class="text-[12px] mt-1" style="color:var(--mc-text-3);">'+r.customer+' · <span class="font-mono">'+r.deal+'</span> · '+r.category+' · '+QAData.fmtMoney(r.value,V.unit)+'</div>'+
        '</div>'+
        '<span class="qa-discount-jump" style="margin-left:8px;"><span class="from">'+r.current+'%</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--mc-text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg><span class="to">'+r.requested+'%</span></span>'+
      '</div>'+
      '<div class="mt-3 mb-3">'+meter(r)+'</div>'+
      '<div class="mc-card" style="background:var(--mc-surface-2);padding:11px 13px;box-shadow:none;"><div class="text-[11px] font-bold uppercase tracking-wider mb-1" style="color:var(--mc-text-3);">Reason</div><div class="text-sm">'+r.reason+'</div></div>'+
      '<div class="flex items-center gap-2 mt-3">'+
        '<input class="mc-input note" placeholder="Add a note (optional)…" style="flex:1;"/>'+
        '<button class="mc-btn mc-btn-sm mc-btn-danger rej">Reject</button>'+
        '<button class="mc-btn mc-btn-sm mc-btn-primary app">Approve '+r.requested+'%</button>'+
      '</div></div>';
  }

  function decidedCard(r){
    var s=QAData.seller(r.seller);
    var ok=r.status==='approved';
    return '<div class="qa-areq">'+
      '<div class="flex items-start gap-3">'+avatar(s)+
        '<div class="flex-1 min-w-0"><div class="flex items-center gap-2 flex-wrap"><span class="font-semibold text-sm">'+s.name+'</span>'+
          '<span class="mc-badge mc-badge-neutral">'+r.level+'</span>'+
          (ok?'<span class="mc-status mc-status-live">Approved</span>':'<span class="mc-status mc-status-error">Rejected</span>')+
          '<span class="text-xs" style="color:var(--mc-text-3);margin-left:auto;">'+QAData.fmtAgo(r.decidedTs||r.ts)+'</span></div>'+
          '<div class="text-[12px] mt-1" style="color:var(--mc-text-3);">'+r.customer+' · <span class="font-mono">'+r.deal+'</span> · '+r.category+'</div></div>'+
        '<span class="qa-discount-jump" style="margin-left:8px;"><span class="from">'+r.current+'%</span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--mc-text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg><span class="to">'+r.requested+'%</span></span>'+
      '</div>'+
      (r.note?'<div class="mt-3 text-sm" style="color:var(--mc-text-2);"><b>'+(r.decidedBy||'Admin')+':</b> '+r.note+'</div>':'')+
    '</div>';
  }

  function render(){
    var pending=QAData.requestsFor(T,'pending');
    var decided=QAData.requestsFor(T).filter(function(r){return r.status!=='pending';});
    $('#cnt-pending').textContent=pending.length;
    $('#cnt-decided').textContent=decided.length;
    document.querySelectorAll('.a-tab').forEach(function(b){ b.classList.toggle('on', b.dataset.tab===TAB); });

    var body=$('#reqBody');
    if(TAB==='pending'){
      body.innerHTML = pending.length ? pending.map(pendingCard).join('') :
        '<div class="qa-lk-empty"><div class="qa-lk-empty-t">Queue is clear 🎉</div><div class="qa-lk-empty-s">No discount requests waiting for your decision.</div></div>';
      body.querySelectorAll('.qa-areq').forEach(function(card){
        var id=card.dataset.id;
        card.querySelector('.app').addEventListener('click', function(){ decide(id,'approved', card.querySelector('.note').value.trim()); });
        card.querySelector('.rej').addEventListener('click', function(){ decide(id,'rejected', card.querySelector('.note').value.trim()); });
      });
    } else {
      body.innerHTML = decided.length ? decided.map(decidedCard).join('') :
        '<div class="qa-lk-empty"><div class="qa-lk-empty-t">Nothing decided yet.</div></div>';
    }
  }
  function decide(id,status,note){
    QAData.decideRequest(id,status,note,'Daniel Reyes');
    QAData.toast('Request '+status+'.', status==='approved'?'success':'warn');
    render();
    // refresh sidebar pending counter
    var aside=document.querySelector('.mc-side'); if(window.QA && QA.renderSidebar){ /* no-op */ }
  }

  document.querySelectorAll('.a-tab').forEach(function(b){ b.addEventListener('click', function(){ TAB=b.dataset.tab; render(); }); });
  render();
})();
</script>
</body>
</html>
