<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>QuoteAssist — Salespeople</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="qa-config.js"></script>
<link rel="stylesheet" href="qa.css"/>
<style>
  .lv-badge { display:inline-flex; align-items:center; height:22px; padding:0 10px; border-radius:99px; font:700 11px/1 'Inter',sans-serif; }
</style>
</head>
<body class="font-sans" data-screen-label="Agency · Salespeople">

<div class="mc-shell">
  <aside class="mc-side" data-nav data-app="agency" data-active="sellers"></aside>

  <div class="min-w-0">
    <header class="mc-topbar">
      <div class="flex items-center gap-2 text-sm">
        <span class="font-medium" style="color: var(--mc-text-3);">Northwind Supply</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--mc-text-3);"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="font-semibold">Salespeople</span>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <a href="agency-quotas.html" class="mc-btn mc-btn-sm mc-btn-secondary">Edit quotas</a>
        <button class="mc-btn mc-btn-sm mc-btn-primary" id="newBtn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          Add salesperson
        </button>
      </div>
    </header>

    <main class="p-8">
      <div class="mb-6">
        <div class="text-xs font-bold tracking-widest uppercase" style="color: var(--mc-text-3);">Northwind Supply</div>
        <h1 class="font-display font-bold text-4xl tracking-[-0.025em] mt-1.5">Salespeople</h1>
        <p class="mt-1.5 text-sm" style="color: var(--mc-text-2);">Each salesperson sits at a level that determines their discount quota. Change a level to instantly change their limits.</p>
      </div>

      <!-- level summary -->
      <div class="grid grid-cols-3 gap-4 mb-6" id="levelCards"></div>

      <div id="sellerList"></div>
    </main>
  </div>
</div>

<script src="qa-data.js"></script>
<script src="qa-listkit.js"></script>
<script src="qa-shell.js"></script>
<script src="qa-tweaks.js"></script>
<script>
(function(){
  var $=function(s,r){return (r||document).querySelector(s);};
  var T=QAData.ACTIVE_TENANT, V=QAData.vertical(QAData.activeTenant().vertical);
  var levelColor={ Junior:200, Senior:265, Lead:30 };
  var ctrl;

  function avatar(s,sz){ sz=sz||36; return '<div class="rounded-full grid place-items-center text-white font-bold flex-shrink-0 text-sm" style="width:'+sz+'px;height:'+sz+'px;background:linear-gradient(135deg,oklch(0.74 0.16 '+s.hue+'),oklch(0.5 0.14 '+s.hue+'));">'+s.name.split(' ').map(function(w){return w[0];}).slice(0,2).join('')+'</div>'; }
  function levelBadge(lv){ var h=levelColor[lv]; return '<span class="lv-badge" style="background:oklch(0.92 0.05 '+h+');color:oklch(0.42 0.13 '+h+');">'+lv+'</span>'; }
  // avg self/cap across categories for a level
  function levelRange(lv){
    var selfs=[], caps=[];
    V.categories.forEach(function(c){ var q=QAData.quotaFor(T,lv,c); selfs.push(q.self); caps.push(q.cap); });
    return { self:[Math.min.apply(null,selfs),Math.max.apply(null,selfs)], cap:[Math.min.apply(null,caps),Math.max.apply(null,caps)] };
  }

  function renderLevels(){
    document.getElementById('levelCards').innerHTML = QAData.LEVELS.map(function(lv){
      var r=levelRange(lv), n=QAData.SELLERS.filter(function(s){return s.level===lv;}).length, h=levelColor[lv];
      return '<div class="mc-card p-5"><div class="flex items-center justify-between mb-3">'+levelBadge(lv)+
        '<span class="text-xs" style="color:var(--mc-text-3);">'+n+' '+(n===1?'person':'people')+'</span></div>'+
        '<div class="qa-statline"><span class="n" style="color:oklch(0.45 0.13 '+h+');">'+r.self[0]+'–'+r.self[1]+'%</span><span class="text-xs" style="color:var(--mc-text-3);">self-approve</span></div>'+
        '<div class="qa-statline mt-1"><span class="n" style="font-size:16px;">'+r.cap[0]+'–'+r.cap[1]+'%</span><span class="text-xs" style="color:var(--mc-text-3);">with approval</span></div>'+
      '</div>';
    }).join('');
  }

  function dealsBy(id){ return QAData.deals.filter(function(d){return d.seller===id;}).length; }
  function pendingBy(id){ return QAData.requests.filter(function(r){return r.seller===id && r.status==='pending';}).length; }

  function viewTable(items){
    var rows=items.map(function(s){
      return '<tr><td><div class="flex items-center gap-3">'+avatar(s)+'<div><div class="font-semibold text-sm">'+s.name+(s.you?' <span class="text-xs font-normal" style="color:var(--mc-text-3);">(you)</span>':'')+'</div><div class="text-[11px]" style="color:var(--mc-text-3);">'+s.email+'</div></div></div></td>'+
        '<td>'+levelBadge(s.level)+'</td>'+
        '<td class="font-mono text-xs">'+dealsBy(s.id)+'</td>'+
        '<td>'+(pendingBy(s.id)?'<span class="mc-badge mc-badge-brand">'+pendingBy(s.id)+' pending</span>':'<span class="text-xs" style="color:var(--mc-text-3);">—</span>')+'</td>'+
        '<td class="text-right"><button class="mc-btn mc-btn-sm mc-btn-secondary edit" data-id="'+s.id+'">Change level</button></td></tr>';
    }).join('');
    return '<div class="mc-card overflow-hidden"><table class="mc-table"><thead><tr><th>Salesperson</th><th>Level</th><th>Open deals</th><th>Approvals</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
  }
  function viewCards(items){
    return '<div class="qa-cardgrid">'+items.map(function(s){
      return '<div class="qa-dcard"><div class="flex items-center gap-3">'+avatar(s,42)+'<div class="min-w-0"><div class="font-semibold text-sm truncate">'+s.name+'</div><div class="text-[11px] truncate" style="color:var(--mc-text-3);">'+s.email+'</div></div></div>'+
        '<div class="flex items-center justify-between mt-4 pt-3" style="border-top:1px solid var(--mc-border);">'+levelBadge(s.level)+'<button class="mc-btn mc-btn-sm mc-btn-ghost edit" data-id="'+s.id+'" style="color:var(--mc-brand);">Change level</button></div></div>';
    }).join('')+'</div>';
  }
  function bind(body){
    body.querySelectorAll('.edit').forEach(function(b){ b.addEventListener('click', function(){ openLevel(QAData.seller(b.dataset.id)); }); });
  }

  function modal(html){
    var bd=document.createElement('div'); bd.className='mc-modal-backdrop'; bd.style.display='grid';
    bd.innerHTML='<div class="mc-modal" style="max-width:440px;">'+html+'</div>';
    document.body.appendChild(bd);
    bd.addEventListener('click',function(e){ if(e.target===bd) bd.remove(); });
    bd.querySelectorAll('[data-close]').forEach(function(b){ b.addEventListener('click',function(){bd.remove();}); });
    return bd;
  }
  function openLevel(s){
    var bd=modal('<div class="mc-modal-head"><div><div class="font-display font-bold text-lg">'+s.name+'</div><div class="text-xs mt-0.5" style="color:var(--mc-text-3);">Set the level that drives their discount quota.</div></div><button class="mc-btn mc-btn-sm mc-btn-icon mc-btn-ghost" data-close><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button></div>'+
      '<div class="mc-modal-body"><div class="space-y-2">'+QAData.LEVELS.map(function(lv){
        var r=levelRange(lv);
        return '<label class="qa-listrow" style="border:1px solid var(--mc-border);border-radius:12px;cursor:pointer;margin-bottom:8px;"><input type="radio" name="lv" value="'+lv+'"'+(lv===s.level?' checked':'')+' style="accent-color:var(--mc-brand);width:18px;height:18px;"/>'+
          '<div style="flex:1;">'+levelBadge(lv)+'</div><span class="font-mono text-xs" style="color:var(--mc-text-3);">'+r.self[0]+'–'+r.self[1]+'% self · up to '+r.cap[1]+'%</span></label>';
      }).join('')+'</div></div>'+
      '<div class="mc-modal-foot"><button class="mc-btn mc-btn-sm mc-btn-ghost" data-close>Cancel</button><button class="mc-btn mc-btn-sm mc-btn-primary" id="lv-save">Save level</button></div>');
    $('#lv-save',bd).onclick=function(){ var sel=bd.querySelector('input[name=lv]:checked').value; s.level=sel; bd.remove(); renderLevels(); ctrl.refresh(); QAData.toast(s.name+' is now '+sel+'.'); };
  }

  document.getElementById('newBtn').addEventListener('click', function(){ QAData.toast('Add salesperson — demo only.'); });

  renderLevels();
  ctrl = window.QAList({
    mount:'sellerList', key:'sellers', noun:'salesperson', searchPlaceholder:'Search name or email…',
    views:['table','cards'], defaultView:'table', pageSize:6, emptyTitle:'No salespeople match.',
    filterFields:{ level:{ label:'Level', type:'enum', ops:['is','is not'], options:QAData.LEVELS, get:function(s){return s.level;} } },
    filterOrder:['level'],
    sortFields:{ name:{ label:'Name', key:function(s){return s.name;}, dir:['A → Z','Z → A'] }, level:{ label:'Level', key:function(s){return QAData.LEVELS.indexOf(s.level);}, dir:['Junior → Lead','Lead → Junior'], numeric:true } },
    sortOrder:['name','level'],
    searchText:function(s){return s.name+' '+s.email;},
    getData:function(){return QAData.SELLERS.slice();},
    renderView:function(v,items){ return v==='cards'?viewCards(items):viewTable(items); },
    onRendered:function(v,items,body){ bind(body); }
  });
})();
</script>
</body>
</html>
