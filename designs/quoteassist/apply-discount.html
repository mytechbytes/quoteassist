<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>QuoteAssist — Apply discount</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="qa-config.js"></script>
<link rel="stylesheet" href="qa.css"/>
<style>
  input[type=range].disc { -webkit-appearance:none; appearance:none; width:100%; height:8px; border-radius:99px; background:transparent; outline:none; position:relative; z-index:3; }
  input[type=range].disc::-webkit-slider-thumb { -webkit-appearance:none; width:24px; height:24px; border-radius:99px; background:var(--mc-text); border:4px solid var(--mc-surface); box-shadow:0 1px 6px rgb(0 0 0/.3); cursor:pointer; }
  input[type=range].disc::-moz-range-thumb { width:24px; height:24px; border-radius:99px; background:var(--mc-text); border:4px solid var(--mc-surface); cursor:pointer; }
  .disc-num { width:96px; height:52px; text-align:center; border-radius:12px; border:1px solid var(--mc-border-2); background:var(--mc-surface); color:var(--mc-text); font:700 26px/1 'JetBrains Mono',monospace; outline:none; }
  .disc-num:focus { border-color:var(--mc-brand); box-shadow:0 0 0 3px var(--mc-brand-ring); }
</style>
</head>
<body class="font-sans" data-screen-label="Sales · Apply discount">

<div class="mc-shell">
  <aside class="mc-side" data-nav data-app="sales" data-active="discount"></aside>

  <div class="min-w-0">
    <header class="mc-topbar">
      <div class="flex items-center gap-2 text-sm">
        <span class="font-medium" style="color: var(--mc-text-3);">Workspace</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--mc-text-3);"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="font-semibold">Apply discount</span>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <span class="qa-vchip" id="tb-me"></span>
      </div>
    </header>

    <main class="p-8 max-w-[1240px]">
      <div class="mb-6">
        <div class="text-xs font-bold tracking-widest uppercase" style="color: var(--mc-text-3);">Workspace</div>
        <h1 class="font-display font-bold text-4xl tracking-[-0.025em] mt-1.5">Apply a discount</h1>
        <p class="mt-1.5 text-sm" style="color: var(--mc-text-2);">Pick a deal, set the discount, and we'll check it against your quota. Anything over your self-approve limit routes for approval before it can be sent.</p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-[1.3fr_1fr] gap-6">
        <!-- LEFT: the apply form -->
        <div class="mc-card p-6">
          <label class="mc-label">Deal</label>
          <select class="mc-input mc-select mb-5" id="dealSel"></select>

          <div class="grid grid-cols-3 gap-3 mb-5">
            <div><div class="mc-label">Category</div><div class="mc-card" style="background:var(--mc-surface-2);box-shadow:none;padding:11px 13px;"><span id="d-cat" class="font-semibold text-sm"></span></div></div>
            <div><div class="mc-label">Order value</div><div class="mc-card" style="background:var(--mc-surface-2);box-shadow:none;padding:11px 13px;"><span id="d-val" class="font-semibold text-sm font-mono"></span></div></div>
            <div><div class="mc-label">Your level</div><div class="mc-card" style="background:var(--mc-surface-2);box-shadow:none;padding:11px 13px;"><span id="d-lvl" class="font-semibold text-sm"></span></div></div>
          </div>

          <div class="flex items-end justify-between mb-2">
            <label class="mc-label" style="margin:0;">Discount to apply</label>
            <span class="text-xs" id="net" style="color:var(--mc-text-3);"></span>
          </div>
          <div class="flex items-center gap-4 mb-3">
            <input class="disc-num" id="discNum" type="number" min="0" max="50" step="0.5" value="0"/>
            <div class="flex-1">
              <div class="qa-meter" id="meter">
                <div class="qa-meter-self" id="m-self"></div>
                <div class="qa-meter-appr" id="m-appr"></div>
                <div class="qa-meter-over" id="m-over"></div>
                <div class="qa-meter-fill" id="m-fill" style="width:0%;"></div>
              </div>
              <div style="position:relative; height:14px; margin-top:5px;">
                <span class="font-mono text-[10px]" style="position:absolute; left:0; color:var(--mc-text-3);">0%</span>
                <span class="font-mono text-[10px]" id="lab-self" style="position:absolute; transform:translateX(-50%); color:color-mix(in oklch,var(--mc-success) 70%,black 30%);"></span>
                <span class="font-mono text-[10px]" id="lab-cap" style="position:absolute; transform:translateX(-50%); color:var(--mc-brand);"></span>
              </div>
            </div>
          </div>
          <input type="range" class="disc" id="discRange" min="0" max="50" step="0.5" value="0" style="margin-bottom:18px;"/>

          <!-- outcome -->
          <div id="outcome"></div>

          <!-- action -->
          <div id="action" class="mt-5"></div>
        </div>

        <!-- RIGHT: my requests -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <div class="font-display font-bold text-lg">My discount requests</div>
          </div>
          <div id="myReqs" class="space-y-3"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- request modal -->
<div id="reqModal" class="mc-modal-backdrop" style="display:none;">
  <div class="mc-modal" style="max-width:520px;">
    <div class="mc-modal-head"><div><div class="font-display font-bold text-lg">Request approval</div><div class="text-xs mt-0.5" style="color:var(--mc-text-3);" id="rm-route"></div></div>
      <button class="mc-btn mc-btn-sm mc-btn-icon mc-btn-ghost" id="rm-close"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="mc-modal-body">
      <div class="qa-areq" style="border:0;padding:0;margin-bottom:16px;">
        <div class="flex items-center justify-between">
          <div><div class="text-sm font-semibold" id="rm-customer"></div><div class="text-[11px]" style="color:var(--mc-text-3);" id="rm-meta"></div></div>
          <span class="qa-discount-jump"><span class="from" id="rm-from"></span><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--mc-text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg><span class="to" id="rm-to"></span></span>
        </div>
      </div>
      <label class="mc-label">Reason for the discount <span style="color:var(--mc-error);">*</span></label>
      <textarea class="mc-input" id="rm-reason" rows="3" placeholder="e.g. Repeat customer matching a competitor quote; volume commitment for Q3."></textarea>
    </div>
    <div class="mc-modal-foot"><button class="mc-btn mc-btn-sm mc-btn-ghost" id="rm-cancel">Cancel</button><button class="mc-btn mc-btn-sm mc-btn-primary" id="rm-send">Send request</button></div>
  </div>
</div>

<script src="qa-data.js"></script>
<script src="qa-shell.js"></script>
<script src="qa-tweaks.js"></script>
<script>
(function(){
  var $=function(s){return document.querySelector(s);};
  var T=QAData.ACTIVE_TENANT, V=QAData.vertical(QAData.activeTenant().vertical), ME=QAData.me();
  $('#tb-me').innerHTML = QAData.svgIcon('<circle cx="12" cy="8" r="4"/><path d="M4 21c1-4.5 4-7 8-7s7 2.5 8 7"/>',13)+ME.name+' · '+ME.level;

  // deals this seller owns (fallback to all if none)
  var myDeals = QAData.deals.filter(function(d){return d.seller===ME.id;});
  if(!myDeals.length) myDeals = QAData.deals.slice();
  $('#dealSel').innerHTML = myDeals.map(function(d){ return '<option value="'+d.ref+'">'+d.ref+' · '+d.customer+' · '+QAData.fmtMoney(d.value,V.unit)+'</option>'; }).join('');

  var current=null, applied=0, max=50;

  function selectDeal(ref){
    current = myDeals.filter(function(d){return d.ref===ref;})[0];
    $('#d-cat').textContent=current.category;
    $('#d-val').textContent=QAData.fmtMoney(current.value,V.unit);
    $('#d-lvl').textContent=ME.level;
    var q=QAData.quotaFor(T,ME.level,current.category);
    var ceiling=QAData.guardrails[QAData.activeTenant().vertical];
    max=ceiling;
    $('#discNum').max=max; $('#discRange').max=max;
    applied = current.baseDiscount||0;
    $('#discNum').value=applied; $('#discRange').value=applied;
    // meter zones
    $('#m-self').style.width=(q.self/max*100)+'%';
    $('#m-appr').style.left=(q.self/max*100)+'%'; $('#m-appr').style.width=((q.cap-q.self)/max*100)+'%';
    $('#m-over').style.left=(q.cap/max*100)+'%'; $('#m-over').style.width=((max-q.cap)/max*100)+'%';
    $('#lab-self').textContent='self '+q.self+'%'; $('#lab-self').style.left=(q.self/max*100)+'%';
    $('#lab-cap').textContent='cap '+q.cap+'%'; $('#lab-cap').style.left=(q.cap/max*100)+'%';
    update();
  }

  function update(){
    var q=QAData.quotaFor(T,ME.level,current.category);
    $('#m-fill').style.width=(applied/max*100)+'%';
    var netVal = current.value*(1-applied/100);
    $('#net').textContent = applied>0 ? 'Net '+QAData.fmtMoney(netVal,V.unit)+' · saves '+QAData.fmtMoney(current.value-netVal,V.unit) : '';
    var r=QAData.route(T,ME.level,current.category,applied);

    var oc=$('#outcome'), ac=$('#action');
    if(r.decision==='auto'){
      oc.innerHTML='<div class="qa-outcome ok"><div class="qa-outcome-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div><div><div class="font-semibold text-sm">Within your limit</div><div class="text-xs mt-0.5" style="color:var(--mc-text-2);">You can apply up to '+q.self+'% on '+current.category+' without approval. Apply and send straight away.</div></div></div>';
      ac.innerHTML='<button class="mc-btn mc-btn-primary w-full" id="applyBtn">Apply '+applied+'% &amp; continue</button>';
      $('#applyBtn').onclick=function(){ current.baseDiscount=applied; QAData.persist(); QAData.toast(applied+'% applied to '+current.ref+'.'); };
    } else if(r.decision==='pending'){
      oc.innerHTML='<div class="qa-outcome warn"><div class="qa-outcome-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg></div><div><div class="font-semibold text-sm">Approval needed</div><div class="text-xs mt-0.5" style="color:var(--mc-text-2);">'+applied+'% is above your '+q.self+'% self-approve limit. This routes to <b>'+r.approver+'</b> for approval before it can be sent.</div></div></div>';
      ac.innerHTML='<button class="mc-btn mc-btn-primary w-full" id="reqBtn">Request approval for '+applied+'%</button>';
      $('#reqBtn').onclick=openReq;
    } else {
      oc.innerHTML='<div class="qa-outcome bad"><div class="qa-outcome-ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg></div><div><div class="font-semibold text-sm">Above the cap</div><div class="text-xs mt-0.5" style="color:var(--mc-text-2);">'+applied+'% exceeds the maximum '+q.cap+'% allowed for '+ME.level+' on '+current.category+'. Lower it to request approval.</div></div></div>';
      ac.innerHTML='<button class="mc-btn mc-btn-primary w-full" disabled style="opacity:.5;cursor:not-allowed;">Request approval</button>';
    }
  }

  function openReq(){
    var q=QAData.quotaFor(T,ME.level,current.category);
    var r=QAData.route(T,ME.level,current.category,applied);
    $('#rm-route').textContent='Routes to '+r.approver+' · '+current.category+' · '+ME.level;
    $('#rm-customer').textContent=current.customer+' ('+current.ref+')';
    $('#rm-meta').textContent=current.category+' · '+QAData.fmtMoney(current.value,V.unit);
    $('#rm-from').textContent=q.self+'%'; $('#rm-to').textContent=applied+'%';
    $('#rm-reason').value='';
    $('#reqModal').style.display='grid';
    setTimeout(function(){ $('#rm-reason').focus(); },50);
  }
  function closeReq(){ $('#reqModal').style.display='none'; }
  $('#rm-close').onclick=closeReq; $('#rm-cancel').onclick=closeReq;
  $('#reqModal').addEventListener('click', function(e){ if(e.target===$('#reqModal')) closeReq(); });
  $('#rm-send').onclick=function(){
    var reason=$('#rm-reason').value.trim();
    if(!reason){ $('#rm-reason').focus(); $('#rm-reason').style.borderColor='var(--mc-error)'; return; }
    var q=QAData.quotaFor(T,ME.level,current.category);
    var r=QAData.route(T,ME.level,current.category,applied);
    QAData.addRequest({ tenant:T, deal:current.ref, customer:current.customer, category:current.category, value:current.value, seller:ME.id, level:ME.level, current:current.baseDiscount||q.self, requested:applied, routedTo:r.approver, reason:reason });
    closeReq(); QAData.toast('Approval request sent to '+r.approver+'.');
    renderMyReqs();
  }

  function renderMyReqs(){
    var reqs=QAData.myRequests(ME.id);
    $('#myReqs').innerHTML = reqs.length ? reqs.map(function(r){
      var badge = r.status==='pending' ? '<span class="mc-status mc-status-build">Pending</span>'
        : r.status==='approved' ? '<span class="mc-status mc-status-live">Approved</span>'
        : '<span class="mc-status mc-status-error">Rejected</span>';
      return '<div class="qa-areq" style="padding:14px 16px;"><div class="flex items-center justify-between gap-2"><div class="min-w-0"><div class="text-sm font-semibold truncate">'+r.customer+' <span class="font-mono text-[11px]" style="color:var(--mc-text-3);">'+r.deal+'</span></div>'+
        '<div class="text-[11px]" style="color:var(--mc-text-3);">'+r.category+' · routed to '+r.routedTo+' · '+QAData.fmtAgo(r.ts)+'</div></div>'+badge+'</div>'+
        '<div class="flex items-center justify-between mt-2.5"><span class="qa-discount-jump" style="font-size:13px;"><span class="from" style="font-size:12px;">'+r.current+'%</span><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="var(--mc-text-3)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M13 6l6 6-6 6"/></svg><span class="to">'+r.requested+'%</span></span>'+
        (r.note?'<span class="text-[11px] italic" style="color:var(--mc-text-3);max-width:55%;text-align:right;">"'+r.note+'"</span>':'')+'</div></div>';
    }).join('') : '<div class="qa-lk-empty"><div class="qa-lk-empty-t">No requests yet.</div><div class="qa-lk-empty-s">Discounts over your limit will show here.</div></div>';
  }

  // wire inputs
  $('#discNum').addEventListener('input', function(){ applied=Math.max(0,Math.min(max,parseFloat(this.value)||0)); $('#discRange').value=applied; update(); });
  $('#discRange').addEventListener('input', function(){ applied=parseFloat(this.value); $('#discNum').value=applied; update(); });
  $('#dealSel').addEventListener('change', function(){ selectDeal(this.value); });

  selectDeal(myDeals[0].ref);
  renderMyReqs();
})();
</script>
</body>
</html>
