<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>QuoteAssist — Team &amp; access</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="qa-config.js"></script>
<link rel="stylesheet" href="qa.css"/>
<style>
  /* tabs */
  #teamTabs { display:flex; gap:2px; border-bottom:1px solid var(--mc-border); margin-bottom:24px; }
  .qa-ttab { position:relative; padding:11px 4px; margin-right:22px; border:0; background:transparent; cursor:pointer; font:600 14px/1 'Inter',sans-serif; color:var(--mc-text-3); }
  .qa-ttab:hover { color:var(--mc-text); }
  .qa-ttab.on { color:var(--mc-text); }
  .qa-ttab.on::after { content:''; position:absolute; left:0; right:0; bottom:-1px; height:2px; background:var(--mc-brand); border-radius:2px; }

  /* role cards */
  .qa-role-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; }
  @media (max-width:760px){ .qa-role-grid{grid-template-columns:1fr;} }
  .qa-role-card { background:var(--mc-surface); border:1px solid var(--mc-border); border-radius:var(--mc-r-card); padding:18px 18px 14px; }

  /* row / role kebab menu */
  .qa-menu { position:absolute; z-index:80; min-width:188px; background:var(--mc-surface); border:1px solid var(--mc-border); border-radius:11px; box-shadow:0 24px 60px -12px rgb(0 0 0 / 0.28); padding:5px; }
  .qa-menu button { display:block; width:100%; text-align:left; padding:8px 10px; border:0; border-radius:7px; background:transparent; color:var(--mc-text); font:500 13px/1 'Inter',sans-serif; cursor:pointer; }
  .qa-menu button:hover { background:var(--mc-surface-2); }
  .qa-menu button.danger { color:var(--mc-error); }
  .qa-menu button[disabled] { color:var(--mc-text-3); cursor:not-allowed; }
  .qa-menu button[disabled]:hover { background:transparent; }
  .qa-menu-sep { height:1px; background:var(--mc-border); margin:5px 4px; }

  /* permission checklist (role modal) */
  .qa-pl { margin-top:8px; border:1px solid var(--mc-border); border-radius:12px; max-height:300px; overflow:auto; }
  .qa-pl-locked { opacity:.7; }
  .qa-pl-group + .qa-pl-group { border-top:1px solid var(--mc-border); }
  .qa-pl-gh { padding:9px 14px; font:700 10.5px/1 'Inter',sans-serif; text-transform:uppercase; letter-spacing:.08em; color:var(--mc-text-3); background:var(--mc-surface-2); }
  .qa-pl-row { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; font:500 13px/1 'Inter',sans-serif; cursor:pointer; }
  .qa-pl-row:hover { background:var(--mc-surface-2); }
  .qa-pl-row input { width:17px; height:17px; accent-color:var(--mc-brand); cursor:pointer; }

  /* permissions matrix */
  .qa-mx-scroll { overflow-x:auto; }
  .qa-mx { width:100%; border-collapse:collapse; min-width:560px; }
  .qa-mx th, .qa-mx td { border-bottom:1px solid var(--mc-border); }
  .qa-mx thead th { background:var(--mc-surface-2); padding:12px 10px; vertical-align:bottom; }
  .qa-mx-perm { text-align:left; font:500 13px/1.3 'Inter',sans-serif; color:var(--mc-text); padding:11px 14px; white-space:nowrap; }
  .qa-mx-corner { font:700 10.5px/1.2 'Inter',sans-serif; text-transform:uppercase; letter-spacing:.06em; color:var(--mc-text-3); position:sticky; left:0; background:var(--mc-surface-2); z-index:2; }
  td.qa-mx-perm { position:sticky; left:0; background:var(--mc-surface); z-index:1; }
  .qa-mx tr:hover td.qa-mx-perm { background:var(--mc-surface-2); }
  .qa-mx-role { text-align:center; min-width:104px; }
  .qa-mx-rolename { font:700 12px/1.2 'Inter',sans-serif; color:var(--mc-text); }
  .qa-mx-rolemeta { font:500 10.5px/1.2 'JetBrains Mono',monospace; color:var(--mc-text-3); margin-top:3px; }
  .qa-mx-grouphead { padding:9px 14px; font:700 10.5px/1 'Inter',sans-serif; text-transform:uppercase; letter-spacing:.08em; color:var(--mc-brand); background:var(--mc-brand-soft); position:sticky; left:0; }
  .qa-mx-cell { text-align:center; padding:6px; }
  .qa-mx tr:hover td { background:var(--mc-surface-2); }
  .qa-mx tr:hover .qa-mx-grouphead { background:var(--mc-brand-soft); }
  .qa-tick { width:26px; height:26px; display:inline-grid; place-items:center; border:1.5px solid var(--mc-border-2); border-radius:7px; background:var(--mc-surface); color:#fff; cursor:pointer; transition:all .12s; }
  .qa-tick:hover { border-color:var(--mc-brand); }
  .qa-tick.on { background:var(--mc-brand); border-color:var(--mc-brand); }
  .dark .qa-tick.on { color:oklch(18% 0.02 200); }
  .qa-tick.lock { cursor:not-allowed; opacity:.85; }
  .qa-tick.lock:hover { border-color:var(--mc-brand); }

  /* permission list / card views */
  .qa-perm-row { display:flex; align-items:center; gap:14px; padding:13px 16px; border-bottom:1px solid var(--mc-border); }
  .qa-perm-row:last-child { border-bottom:0; }
  .qa-perm-row:hover { background:var(--mc-surface-2); }
  .qa-perm-main { flex:1; min-width:0; }
  .qa-perm-name { font:500 13.5px/1.2 'Inter',sans-serif; }
  .qa-perm-grp { font:600 10px/1 'Inter',sans-serif; text-transform:uppercase; letter-spacing:.08em; color:var(--mc-text-3); margin-top:4px; }
  .qa-perm-roles { display:flex; flex-wrap:wrap; gap:5px; justify-content:flex-end; max-width:60%; }
  .qa-rolechip { display:inline-flex; align-items:center; height:22px; padding:0 9px; border-radius:99px; font:600 11px/1 'Inter',sans-serif; background:var(--mc-brand-soft); color:var(--mc-brand); }
  .qa-rolechip.off { background:var(--mc-surface-2); color:var(--mc-text-3); }
  .qa-perm-none { font:500 12px/1 'Inter',sans-serif; color:var(--mc-text-3); }
  /* role table actions */
  .qa-role-acts { display:flex; align-items:center; gap:6px; justify-content:flex-end; }
</style>
</head>
<body class="font-sans" data-screen-label="Team">

<div class="mc-shell">
  <aside class="mc-side" data-nav data-active="team"></aside>

  <div class="min-w-0">
    <header class="mc-topbar">
      <div class="flex items-center gap-2 text-sm">
        <span class="font-medium" style="color: var(--mc-text-3);">Account</span>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: var(--mc-text-3);"><polyline points="9 18 15 12 9 6"/></svg>
        <span class="font-semibold">Team &amp; access</span>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <span class="mc-status" id="seatCount" style="color:var(--mc-text-3);">7 of 20 seats used</span>
        <div class="w-px h-6 mx-1" style="background: var(--mc-border);"></div>
        <button class="mc-btn mc-btn-sm mc-btn-primary" id="primaryBtn">Invite member</button>
      </div>
    </header>

    <main class="p-8 max-w-[1080px]">
      <div class="mb-6">
        <div class="text-xs font-bold tracking-widest uppercase" style="color: var(--mc-text-3);">Account</div>
        <h1 class="font-display font-bold text-4xl tracking-[-0.025em] mt-1.5">Team &amp; access</h1>
        <p class="mt-1.5 text-sm" style="color: var(--mc-text-2);">Manage who can draft quotes, the roles they hold and exactly what each role is allowed to do.</p>
      </div>

      <div id="teamTabs">
        <button class="qa-ttab on" data-tab="members">Members</button>
        <button class="qa-ttab" data-tab="roles">Roles</button>
        <button class="qa-ttab" data-tab="perms">Permissions</button>
      </div>

      <div id="tab-members"><div id="lkMembers"></div><div id="pendingWrap" class="mt-6"></div></div>
      <div id="tab-roles" style="display:none;"><div id="lkRoles"></div></div>
      <div id="tab-perms" style="display:none;"><div id="lkPerms"></div></div>
    </main>
  </div>
</div>

<div id="toast" class="mc-card" style="display:none; position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:120; padding:12px 18px; box-shadow: var(--mc-pop, 0 24px 60px -12px rgb(0 0 0 / 0.25)); align-items:center; gap:10px;"></div>

<script src="qa-shell.js"></script>
<script src="qa-tweaks.js"></script>
<script src="qa-listkit.js"></script>
<script src="qa-team.js"></script>
</body>
</html>
