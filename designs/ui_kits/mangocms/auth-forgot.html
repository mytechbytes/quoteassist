<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>MangoCMS — Forgot password</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="mangocms-config.js"></script>
<link rel="stylesheet" href="mangocms.css"/>
<style>
  body.auth-center { display: grid; place-items: center; min-height: 100vh; padding: 56px 24px; background: var(--mc-bg); position: relative; overflow: hidden; }
  body.auth-center::before { content:''; position: absolute; left: -10%; top: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse, oklch(0.74 0.16 60 / 0.15), transparent 60%); pointer-events: none; filter: blur(60px); }
  body.auth-center::after { content:''; position: absolute; right: -10%; bottom: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse, oklch(0.58 0.17 50 / 0.12), transparent 60%); pointer-events: none; filter: blur(60px); }
  .auth-mini { width: 100%; max-width: 440px; position: relative; }
</style>
</head>
<body class="font-sans auth-center">
<div class="auth-mini">
  <a href="index.html" class="flex items-center justify-center gap-2.5 mb-9" style="text-decoration:none; color:inherit;">
    <span class="mc-logo" style="width:36px; height:36px; font-size: 18px;">M</span>
    <span class="font-display font-bold text-xl">MangoCMS</span>
  </a>

  <div class="mc-card p-9">
    <div class="w-12 h-12 rounded-2xl grid place-items-center mb-5" style="background: var(--mc-brand-soft); color: var(--mc-brand);">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    </div>
    <h1 class="font-display font-bold text-2xl tracking-[-0.02em]">Reset your password</h1>
    <p class="mt-2 text-sm" style="color: var(--mc-text-2);">Tell us the email on your workspace. We'll send a one-time link — it expires in 30 minutes.</p>

    <form class="mt-6 space-y-4">
      <div>
        <label class="mc-label">Workspace email</label>
        <input class="mc-input mc-input-lg" type="email" placeholder="harper@renza.studio" autocomplete="email"/>
      </div>
      <button class="mc-btn mc-btn-lg mc-btn-primary w-full">Send reset link</button>
    </form>

    <div class="mt-6 mc-hairline"></div>
    <div class="mt-4 text-sm text-center" style="color: var(--mc-text-2);">
      Remembered it? <a href="auth-login.html" class="font-semibold" style="color: var(--mc-brand);">Back to sign in</a>
    </div>
  </div>

  <div class="mt-6 text-center text-xs" style="color: var(--mc-text-3);">
    Trouble accessing your workspace? <a href="#" style="color: var(--mc-text-2); text-decoration: underline;">Contact support</a>
  </div>
</div>
<script src="mangocms-shell.js"></script>
</body>
</html>
