<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>MangoCMS — Reset password</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Familjen+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<script src="mangocms-config.js"></script>
<link rel="stylesheet" href="mangocms.css"/>
<style>
  body.auth-center { display: grid; place-items: center; min-height: 100vh; padding: 56px 24px; background: var(--mc-bg); position: relative; overflow: hidden; }
  body.auth-center::before { content:''; position: absolute; left: -10%; top: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse, oklch(0.74 0.16 60 / 0.15), transparent 60%); pointer-events: none; filter: blur(60px); }
  body.auth-center::after { content:''; position: absolute; right: -10%; bottom: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse, oklch(0.58 0.17 50 / 0.12), transparent 60%); pointer-events: none; filter: blur(60px); }
  .auth-mini { width: 100%; max-width: 440px; position: relative; }
  .req { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--mc-text-3); }
  .req.met { color: var(--mc-success); }
  .req svg { flex-shrink: 0; }
</style>
</head>
<body class="font-sans auth-center">
<div class="auth-mini">
  <a href="index.html" class="flex items-center justify-center gap-2.5 mb-9" style="text-decoration:none; color:inherit;">
    <span class="mc-logo" style="width:36px; height:36px; font-size: 18px;">M</span>
    <span class="font-display font-bold text-xl">MangoCMS</span>
  </a>

  <div class="mc-card p-9">
    <h1 class="font-display font-bold text-2xl tracking-[-0.02em]">Set a new password</h1>
    <p class="mt-2 text-sm" style="color: var(--mc-text-2);">For <b style="color: var(--mc-text);">harper@renza.studio</b>. You'll be signed in on every device after this.</p>

    <form class="mt-6 space-y-4">
      <div>
        <label class="mc-label">New password</label>
        <input class="mc-input mc-input-lg" type="password" placeholder="At least 10 characters" autocomplete="new-password"/>
      </div>
      <div>
        <label class="mc-label">Confirm new password</label>
        <input class="mc-input mc-input-lg" type="password" autocomplete="new-password"/>
      </div>

      <ul class="space-y-1.5 mt-3">
        <li class="req met">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          At least 10 characters
        </li>
        <li class="req met">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Mix of letters and numbers
        </li>
        <li class="req">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/></svg>
          A symbol (! @ # &amp;)
        </li>
        <li class="req">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/></svg>
          Not a previously used password
        </li>
      </ul>

      <button class="mc-btn mc-btn-lg mc-btn-primary w-full mt-2">Update password &amp; sign in</button>
    </form>

    <div class="mt-6 mc-hairline"></div>
    <div class="mt-4 text-sm text-center" style="color: var(--mc-text-2);">
      Link expired? <a href="auth-forgot.html" class="font-semibold" style="color: var(--mc-brand);">Request a new one</a>
    </div>
  </div>
</div>
<script src="mangocms-shell.js"></script>
</body>
</html>
