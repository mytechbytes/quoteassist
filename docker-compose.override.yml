# Local dev overrides: bind-mount source and run with hot reload.
# `docker compose up` picks this up automatically on top of docker-compose.yml.

services:
  ai-service:
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./ai-service/app:/app/app

  platform:
    command: ["mix", "phx.server"]
    volumes:
      - ./platform:/app
